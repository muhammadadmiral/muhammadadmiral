<svg width="900" height="360" viewBox="0 0 900 360" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="bgH" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#03010f"/>
    <stop offset="100%" stop-color="#08001a"/>
  </linearGradient>
  <linearGradient id="hobbyBorderP" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#ff1cf7"/>
    <stop offset="100%" stop-color="#b06ef3"/>
  </linearGradient>
  <linearGradient id="hobbyBorderC" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#00d4ff"/>
    <stop offset="100%" stop-color="#0080ff"/>
  </linearGradient>
  <linearGradient id="hobbyBorderPu" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#b06ef3"/>
    <stop offset="100%" stop-color="#6600cc"/>
  </linearGradient>
  <linearGradient id="hobbyBorderM" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#00ff88"/>
    <stop offset="100%" stop-color="#00cc66"/>
  </linearGradient>
  <linearGradient id="titleHG" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#ff1cf7"/>
    <stop offset="50%" stop-color="#00d4ff"/>
    <stop offset="100%" stop-color="#00ff88"/>
  </linearGradient>
  <!-- 3D neon glow filters -->
  <filter id="neonP3d" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur stdDeviation="6" result="b">
      <animate attributeName="stdDeviation" values="4;10;4" dur="2.2s" repeatCount="indefinite"/>
    </feGaussianBlur>
    <feFlood flood-color="#ff1cf7" result="c"/>
    <feComposite in="c" in2="b" operator="in" result="g"/>
    <feMerge><feMergeNode in="g"/><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="neonC3d" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur stdDeviation="6" result="b">
      <animate attributeName="stdDeviation" values="4;10;4" dur="2.8s" repeatCount="indefinite"/>
    </feGaussianBlur>
    <feFlood flood-color="#00d4ff" result="c"/>
    <feComposite in="c" in2="b" operator="in" result="g"/>
    <feMerge><feMergeNode in="g"/><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="neonPu3d" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur stdDeviation="6" result="b">
      <animate attributeName="stdDeviation" values="4;10;4" dur="2.5s" repeatCount="indefinite"/>
    </feGaussianBlur>
    <feFlood flood-color="#b06ef3" result="c"/>
    <feComposite in="c" in2="b" operator="in" result="g"/>
    <feMerge><feMergeNode in="g"/><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="neonM3d" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur stdDeviation="6" result="b">
      <animate attributeName="stdDeviation" values="4;10;4" dur="3.1s" repeatCount="indefinite"/>
    </feGaussianBlur>
    <feFlood flood-color="#00ff88" result="c"/>
    <feComposite in="c" in2="b" operator="in" result="g"/>
    <feMerge><feMergeNode in="g"/><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="fog3" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="45"/>
  </filter>
  <filter id="smGlow" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="3"/>
  </filter>
  <!-- 3D isometric grid -->
  <pattern id="iso" width="30" height="52" patternUnits="userSpaceOnUse" patternTransform="translate(0,330) scale(1,-1)">
    <path d="M15 0 L30 8.66 L30 26 L15 34.64 L0 26 L0 8.66 Z" fill="none" stroke="#ffffff" stroke-width="0.2" opacity="0.08"/>
  </pattern>
</defs>

<rect width="900" height="360" fill="url(#bgH)"/>
<rect width="900" height="360" fill="url(#iso)"/>

<!-- Ambient glow blobs -->
<ellipse cx="120" cy="280" rx="180" ry="120" fill="#ff1cf7" opacity="0.12" filter="url(#fog3)">
  <animate attributeName="cx" values="120;180;120" dur="8s" repeatCount="indefinite"/>
</ellipse>
<ellipse cx="790" cy="100" rx="160" ry="110" fill="#00d4ff" opacity="0.10" filter="url(#fog3)">
  <animate attributeName="cy" values="100;140;100" dur="7s" repeatCount="indefinite"/>
</ellipse>

<!-- Title -->
<text x="450" y="42" text-anchor="middle" font-family="'Trebuchet MS','Segoe UI',sans-serif" font-size="22" font-weight="900" fill="url(#titleHG)" filter="url(#smGlow)" letter-spacing="2">
  🎮 interests.render()
  <animate attributeName="opacity" values="1;0.7;1" dur="3.5s" repeatCount="indefinite"/>
</text>
<rect x="320" y="50" width="260" height="1.5" rx="0.75" fill="url(#titleHG)" opacity="0.5"/>

<!-- ======= CARD 1: GYM (PINK) ======= -->
<g>
  <!-- 3D bottom shadow -->
  <rect x="32" y="78" width="200" height="252" rx="20" fill="#ff1cf7" opacity="0.15"/>
  <rect x="28" y="74" width="200" height="252" rx="20" fill="#ff1cf7" opacity="0.08"/>
  <!-- Main card -->
  <rect x="24" y="70" width="200" height="252" rx="20" fill="#08050f" stroke="url(#hobbyBorderP)" stroke-width="2" filter="url(#neonP3d)"/>
  <!-- Top shine -->
  <rect x="26" y="72" width="196" height="1.5" rx="0.75" fill="#ffffff" opacity="0.2"/>
  <!-- Inner glow bar -->
  <rect x="24" y="70" width="200" height="60" rx="20" fill="#ff1cf7" opacity="0.06"/>

  <!-- Emoji + title -->
  <text x="124" y="118" text-anchor="middle" font-size="32">🏋️</text>
  <text x="124" y="146" text-anchor="middle" font-family="'Trebuchet MS',sans-serif" font-size="17" font-weight="900" fill="#ff6ef8" filter="url(#neonP3d)" letter-spacing="2">GYM</text>

  <!-- Items with bullet glow -->
  <circle cx="48" cy="172" r="3" fill="#ff1cf7" filter="url(#neonP3d)">
    <animate attributeName="opacity" values="1;0.3;1" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <text x="62" y="177" font-family="'Segoe UI',sans-serif" font-size="12.5" fill="#f0e0ff">Incline DB Press</text>

  <circle cx="48" cy="200" r="3" fill="#ff1cf7" filter="url(#neonP3d)">
    <animate attributeName="opacity" values="1;0.3;1" dur="2.8s" repeatCount="indefinite"/>
  </circle>
  <text x="62" y="205" font-family="'Segoe UI',sans-serif" font-size="12.5" fill="#f0e0ff">Shoulder Press</text>

  <circle cx="48" cy="228" r="3" fill="#ff1cf7" filter="url(#neonP3d)">
    <animate attributeName="opacity" values="1;0.3;1" dur="3.2s" repeatCount="indefinite"/>
  </circle>
  <text x="62" y="233" font-family="'Segoe UI',sans-serif" font-size="12.5" fill="#f0e0ff">Lat Pulldown</text>

  <circle cx="48" cy="256" r="3" fill="#ff1cf7" filter="url(#neonP3d)">
    <animate attributeName="opacity" values="1;0.3;1" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <text x="62" y="261" font-family="'Segoe UI',sans-serif" font-size="12.5" fill="#f0e0ff">4-5 days / week</text>

  <!-- Bottom stat bar -->
  <rect x="36" y="292" width="176" height="18" rx="9" fill="#0a0010" stroke="#ff1cf7" stroke-width="1" stroke-opacity="0.4"/>
  <rect x="38" y="294" width="0" height="14" rx="7" fill="#ff1cf7" opacity="0.7">
    <animate attributeName="width" values="0;155;155" keyTimes="0;0.5;1" dur="3s" repeatCount="indefinite" begin="0s"/>
  </rect>
  <text x="124" y="305" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="9" fill="#ffffff" opacity="0.9">GAINS MODE: 88%</text>

  <!-- Floating particle -->
  <circle cx="206" cy="88" r="2" fill="#ff1cf7" filter="url(#neonP3d)" opacity="0.9">
    <animateTransform attributeName="transform" type="translate" values="0,0;6,-14;0,0" dur="3.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.9;0.2;0.9" dur="3.8s" repeatCount="indefinite"/>
  </circle>
</g>

<!-- ======= CARD 2: GAMING (CYAN) ======= -->
<g>
  <rect x="244" y="78" width="200" height="252" rx="20" fill="#00d4ff" opacity="0.12"/>
  <rect x="240" y="74" width="200" height="252" rx="20" fill="#00d4ff" opacity="0.06"/>
  <rect x="236" y="70" width="200" height="252" rx="20" fill="#04080f" stroke="url(#hobbyBorderC)" stroke-width="2" filter="url(#neonC3d)"/>
  <rect x="238" y="72" width="196" height="1.5" rx="0.75" fill="#ffffff" opacity="0.2"/>
  <rect x="236" y="70" width="200" height="60" rx="20" fill="#00d4ff" opacity="0.05"/>

  <text x="336" y="118" text-anchor="middle" font-size="32">🎮</text>
  <text x="336" y="146" text-anchor="middle" font-family="'Trebuchet MS',sans-serif" font-size="17" font-weight="900" fill="#6efaff" filter="url(#neonC3d)" letter-spacing="2">GAMING</text>

  <circle cx="260" cy="172" r="3" fill="#00d4ff" filter="url(#neonC3d)">
