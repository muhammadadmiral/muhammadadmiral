<svg width="900" height="280" viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg">
<defs>
  <filter id="neonGlowPink" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur stdDeviation="4" result="b">
      <animate attributeName="stdDeviation" values="3;7;3" dur="2.2s" repeatCount="indefinite"/>
    </feGaussianBlur>
    <feFlood flood-color="#ff2fd8" result="c"/>
    <feComposite in="c" in2="b" operator="in" result="glow"/>
    <feMerge>
      <feMergeNode in="glow"/>
      <feMergeNode in="glow"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
  <filter id="neonGlowCyan" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur stdDeviation="4" result="b">
      <animate attributeName="stdDeviation" values="3;7;3" dur="2.6s" repeatCount="indefinite"/>
    </feGaussianBlur>
    <feFlood flood-color="#2fe0ff" result="c"/>
    <feComposite in="c" in2="b" operator="in" result="glow"/>
    <feMerge>
      <feMergeNode in="glow"/>
      <feMergeNode in="glow"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
  <filter id="neonGlowPurple" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur stdDeviation="4" result="b">
      <animate attributeName="stdDeviation" values="3;7;3" dur="2.4s" repeatCount="indefinite"/>
    </feGaussianBlur>
    <feFlood flood-color="#b026ff" result="c"/>
    <feComposite in="c" in2="b" operator="in" result="glow"/>
    <feMerge>
      <feMergeNode in="glow"/>
      <feMergeNode in="glow"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
  <filter id="neonGlowMint" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur stdDeviation="4" result="b">
      <animate attributeName="stdDeviation" values="3;7;3" dur="2.8s" repeatCount="indefinite"/>
    </feGaussianBlur>
    <feFlood flood-color="#39ff9d" result="c"/>
    <feComposite in="c" in2="b" operator="in" result="glow"/>
    <feMerge>
      <feMergeNode in="glow"/>
      <feMergeNode in="glow"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
</defs>

<rect x="0" y="0" width="900" height="280" fill="#08080f"/>

<text x="450" y="34" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="20" font-weight="700" fill="#ffffff">🎮 interests.render()</text>

