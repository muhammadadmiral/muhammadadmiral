<svg width="900" height="360" viewBox="0 0 900 360" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#020012"/>
    <stop offset="100%" stop-color="#060018"/>
  </linearGradient>

  <!-- Per-card borders — solid, thick strokes using plain color refs -->

  <filter id="fog" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur stdDeviation="45"/>
  </filter>

  <!-- Card-level neon glow: applied to RECT only, text kept separate -->
  <filter id="glowPink" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="8" result="b"/>
    <feFlood flood-color="#f472b6" result="c"/>
    <feComposite in="c" in2="b" operator="in" result="g"/>
    <feMerge><feMergeNode in="g"/><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    <animate attributeName="" values=""/><!-- placeholder -->
  </filter>
  <filter id="glowCyan" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="8" result="b"/>
    <feFlood flood-color="#67e8f9" result="c"/>
    <feComposite in="c" in2="b" operator="in" result="g"/>
    <feMerge><feMergeNode in="g"/><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glowPurple" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="8" result="b"/>
    <feFlood flood-color="#a78bfa" result="c"/>
    <feComposite in="c" in2="b" operator="in" result="g"/>
    <feMerge><feMergeNode in="g"/><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glowGreen" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="8" result="b"/>
    <feFlood flood-color="#4ade80" result="c"/>
    <feComposite in="c" in2="b" operator="in" result="g"/>
    <feMerge><feMergeNode in="g"/><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>

  <!-- Dot glow for bullet dots only -->
  <filter id="dotGlowP" x="-100%" y="-100%" width="300%" height="300%">
    <feGaussianBlur stdDeviation="3"/>
  </filter>

  <linearGradient id="titleG" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#f472b6"/>
    <stop offset="50%" stop-color="#67e8f9"/>
    <stop offset="100%" stop-color="#4ade80"/>
  </linearGradient>

  <!-- Hex bg pattern -->
  <pattern id="hexPat" width="30" height="52" patternUnits="userSpaceOnUse">
    <polygon points="15,1 29,9 29,25 15,33 1,25 1,9"
             fill="none" stroke="#ffffff" stroke-width="0.2" opacity="0.04"/>
  </pattern>

  <!-- Bar gradient per card -->
  <linearGradient id="barP" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#f472b6"/>
    <stop offset="100%" stop-color="#db2777"/>
  </linearGradient>
  <linearGradient id="barC" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#67e8f9"/>
    <stop offset="100%" stop-color="#0891b2"/>
  </linearGradient>
  <linearGradient id="barPu" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#a78bfa"/>
    <stop offset="100%" stop-color="#7c3aed"/>
  </linearGradient>
  <linearGradient id="barG2" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#4ade80"/>
    <stop offset="100%" stop-color="#059669"/>
  </linearGradient>

  <filter id="titleGlow" x="-20%" y="-60%" width="140%" height="220%">
    <feGaussianBlur stdDeviation="6" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>

<rect width="900" height="360" fill="url(#bg)"/>
<rect width="900" height="360" fill="url(#hexPat)"/>

<!-- Ambient orbs -->
<ellipse cx="100" cy="280" rx="180" ry="120" fill="#db2777" opacity="0.12" filter="url(#fog)">
  <animate attributeName="cx" values="100;160;100" dur="9s" repeatCount="indefinite"/>
</ellipse>
<ellipse cx="820" cy="100" rx="160" ry="100" fill="#0891b2" opacity="0.10" filter="url(#fog)">
  <animate attributeName="cy" values="100;130;100" dur="7s" repeatCount="indefinite"/>
</ellipse>

<!-- Title -->
<text x="450" y="40" text-anchor="middle"
      font-family="'Segoe UI',sans-serif" font-size="20" font-weight="800" letter-spacing="3"
      fill="url(#titleG)" filter="url(#titleGlow)">🎮 interests.render()</text>
<rect x="330" y="48" width="240" height="1.5" rx="0.75" fill="url(#titleG)" opacity="0.4"/>

<!-- ======= CARD 1: GYM ======= -->
<!-- Only the border rect gets the glow filter -->
<rect x="20" y="65" width="200" height="262" rx="20" fill="#f472b6" opacity="0.12"/>
<rect x="16" y="61" width="200" height="262" rx="20" fill="#0b0418" stroke="#f472b6" stroke-width="2" filter="url(#glowPink)"/>
<rect x="18" y="63" width="196" height="2" rx="1" fill="#f9a8d4" opacity="0.3"/>
<!-- Inner highlight so card doesn't look flat -->
<rect x="18" y="63" width="196" height="100" rx="20" fill="#f472b6" opacity="0.04"/>

<!-- Emoji -->
<text x="116" y="114" text-anchor="middle" font-size="32">🏋️</text>
<!-- Card title — plain fill, no inherited filter -->
<text x="116" y="140" text-anchor="middle"
      font-family="'Segoe UI',sans-serif" font-size="16" font-weight="800" letter-spacing="2"
      fill="#f9a8d4">GYM</text>

<!-- Bullet items — dots use glow filter, text uses plain fill -->
<circle cx="40" cy="164" r="3.5" fill="#f472b6"><animate attributeName="opacity" values="1;0.3;1" dur="2.4s" repeatCount="indefinite"/></circle>
<text x="56" y="169" font-family="'Segoe UI',sans-serif" font-size="12.5" fill="#f1e8ff">Incline DB Press</text>
<circle cx="40" cy="190" r="3.5" fill="#f472b6"><animate attributeName="opacity" values="1;0.3;1" dur="3.0s" repeatCount="indefinite"/></circle>
<text x="56" y="195" font-family="'Segoe UI',sans-serif" font-size="12.5" fill="#f1e8ff">Shoulder Press</text>
<circle cx="40" cy="216" r="3.5" fill="#f472b6"><animate attributeName="opacity" values="1;0.3;1" dur="2.7s" repeatCount="indefinite"/></circle>
<text x="56" y="221" font-family="'Segoe UI',sans-serif" font-size="12.5" fill="#f1e8ff">Lat Pulldown</text>
<circle cx="40" cy="242" r="3.5" fill="#f472b6"><animate attributeName="opacity" values="1;0.3;1" dur="3.3s" repeatCount="indefinite"/></circle>
<text x="56" y="247" font-family="'Segoe UI',sans-serif" font-size="12.5" fill="#f1e8ff">6 days / week</text>

<!-- Progress bar -->
<rect x="28" y="282" width="176" height="14" rx="7" fill="#0a0410"/>
<rect x="28" y="282" width="0" height="14" rx="7" fill="url(#barP)">
  <animate attributeName="width" from="0" to="158" dur="1.8s" fill="freeze" begin="0.2s"/>
</rect>
<text x="116" y="293" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="9" fill="#fff" opacity="0.9">GAINS: 90%</text>

<!-- Floating spark -->
<circle cx="200" cy="80" r="2" fill="#f472b6" opacity="0.8">
  <animateTransform attributeName="transform" type="translate" values="0,0;6,-16;0,0" dur="4s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0.8;0.1;0.8" dur="4s" repeatCount="indefinite"/>
</circle>

<!-- ======= CARD 2: GAMING ======= -->
<rect x="234" y="65" width="200" height="262" rx="20" fill="#67e8f9" opacity="0.10"/>
<rect x="230" y="61" width="200" height="262" rx="20" fill="#021018" stroke="#67e8f9" stroke-width="2" filter="url(#glowCyan)"/>
<rect x="232" y="63" width="196" height="2" rx="1" fill="#a5f3fc" opacity="0.3"/>
<rect x="232" y="63" width="196" height="100" rx="20" fill="#67e8f9" opacity="0.04"/>

<text x="330" y="114" text-anchor="middle" font-size="32">🎮</text>
<text x="330" y="140" text-anchor="middle"
      font-family="'Segoe UI',sans-serif" font-size="16" font-weight="800" letter-spacing="2"
      fill="#a5f3fc">GAMING</text>

<circle cx="254" cy="164" r="3.5" fill="#67e8f9"><animate attributeName="opacity" values="1;0.3;1" dur="2.2s" repeatCount="indefinite"/></circle>
<text x="270" y="169" font-family="'Segoe UI',sans-serif" font-size="12.5" fill="#e0f7ff">VALORANT</text>
<circle cx="254" cy="190" r="3.5" fill="#67e8f9"><animate attributeName="opacity" values="1;0.3;1" dur="2.9s" repeatCount="indefinite"/></circle>
<text x="270" y="195" font-family="'Segoe UI',sans-serif" font-size="12.5" fill="#e0f7ff">CS2</text>
<circle cx="254" cy="216" r="3.5" fill="#67e8f9"><animate attributeName="opacity" values="1;0.3;1" dur="3.4s" repeatCount="indefinite"/></circle>
<text x="270" y="221" font-family="'Segoe UI',sans-serif" font-size="12.5" fill="#e0f7ff">Overwatch 2</text>
<circle cx="254" cy="242" r="3.5" fill="#67e8f9"><animate attributeName="opacity" values="1;0.3;1" dur="2.6s" repeatCount="indefinite"/></circle>
<text x="270" y="247" font-family="'Segoe UI',sans-serif" font-size="12.5" fill="#e0f7ff">EA Sports FC</text>

<rect x="242" y="282" width="176" height="14" rx="7" fill="#020a10"/>
<rect x="242" y="282" width="0" height="14" rx="7" fill="url(#barC)">
  <animate attributeName="width" from="0" to="140" dur="1.8s" fill="freeze" begin="0.4s"/>
</rect>
<text x="330" y="293" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="9" fill="#fff" opacity="0.9">FRAGGING: 80%</text>

<circle cx="414" cy="80" r="2" fill="#67e8f9" opacity="0.8">
  <animateTransform attributeName="transform" type="translate" values="0,0;-8,-14;0,0" dur="5s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0.8;0.1;0.8" dur="5s" repeatCount="indefinite"/>
</circle>

<!-- ======= CARD 3: MUSIC ======= -->
<rect x="448" y="65" width="200" height="262" rx="20" fill="#a78bfa" opacity="0.10"/>
<rect x="444" y="61" width="200" height="262" rx="20" fill="#060418" stroke="#a78bfa" stroke-width="2" filter="url(#glowPurple)"/>
<rect x="446" y="63" width="196" height="2" rx="1" fill="#ddd6fe" opacity="0.3"/>
<rect x="446" y="63" width="196" height="100" rx="20" fill="#a78bfa" opacity="0.04"/>

<text x="544" y="114" text-anchor="middle" font-size="32">🎸</text>
<text x="544" y="140" text-anchor="middle"
      font-family="'Segoe UI',sans-serif" font-size="16" font-weight="800" letter-spacing="2"
      fill="#ddd6fe">MUSIC</text>

<circle cx="468" cy="164" r="3.5" fill="#a78bfa"><animate attributeName="opacity" values="1;0.3;1" dur="2.6s" repeatCount="indefinite"/></circle>
<text x="484" y="169" font-family="'Segoe UI',sans-serif" font-size="12.5" fill="#ede9ff">Rock / Pop Rock</text>
<circle cx="468" cy="190" r="3.5" fill="#a78bfa"><animate attributeName="opacity" values="1;0.3;1" dur="3.1s" repeatCount="indefinite"/></circle>
<text x="484" y="195" font-family="'Segoe UI',sans-serif" font-size="12.5" fill="#ede9ff">City Pop</text>
<circle cx="468" cy="216" r="3.5" fill="#a78bfa"><animate attributeName="opacity" values="1;0.3;1" dur="2.8s" repeatCount="indefinite"/></circle>
<text x="484" y="221" font-family="'Segoe UI',sans-serif" font-size="12.5" fill="#ede9ff">Vox AC30 Twang</text>
<circle cx="468" cy="242" r="3.5" fill="#a78bfa"><animate attributeName="opacity" values="1;0.3;1" dur="3.6s" repeatCount="indefinite"/></circle>
<text x="484" y="247" font-family="'Segoe UI',sans-serif" font-size="12.5" fill="#ede9ff">0 Gain Tube Screamer</text>

<rect x="456" y="282" width="176" height="14" rx="7" fill="#04020e"/>
<rect x="456" y="282" width="0" height="14" rx="7" fill="url(#barPu)">
  <animate attributeName="width" from="0" to="160" dur="1.8s" fill="freeze" begin="0.6s"/>
</rect>
<text x="544" y="293" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="9" fill="#fff" opacity="0.9">TONE CHASE: 92%</text>

<!-- ======= CARD 4: LIFESTYLE ======= -->
<rect x="664" y="65" width="214" height="262" rx="20" fill="#4ade80" opacity="0.08"/>
<rect x="660" y="61" width="218" height="262" rx="20" fill="#020e06" stroke="#4ade80" stroke-width="2" filter="url(#glowGreen)"/>
<rect x="662" y="63" width="214" height="2" rx="1" fill="#86efac" opacity="0.3"/>
<rect x="662" y="63" width="214" height="100" rx="20" fill="#4ade80" opacity="0.03"/>

<text x="769" y="114" text-anchor="middle" font-size="32">☕</text>
<text x="769" y="140" text-anchor="middle"
      font-family="'Segoe UI',sans-serif" font-size="14" font-weight="800" letter-spacing="2"
      fill="#86efac">LIFESTYLE</text>

<circle cx="682" cy="164" r="3.5" fill="#4ade80"><animate attributeName="opacity" values="1;0.3;1" dur="2.3s" repeatCount="indefinite"/></circle>
<text x="698" y="169" font-family="'Segoe UI',sans-serif" font-size="12.5" fill="#d1fae5">Coffee Addict</text>
<circle cx="682" cy="190" r="3.5" fill="#4ade80"><animate attributeName="opacity" values="1;0.3;1" dur="3.0s" repeatCount="indefinite"/></circle>
<text x="698" y="195" font-family="'Segoe UI',sans-serif" font-size="12.5" fill="#d1fae5">Late Night Coding</text>
<circle cx="682" cy="216" r="3.5" fill="#4ade80"><animate attributeName="opacity" values="1;0.3;1" dur="2.7s" repeatCount="indefinite"/></circle>
<text x="698" y="221" font-family="'Segoe UI',sans-serif" font-size="12.5" fill="#d1fae5">Bugs fixed at 2AM</text>
<circle cx="682" cy="242" r="3.5" fill="#4ade80"><animate attributeName="opacity" values="1;0.3;1" dur="3.4s" repeatCount="indefinite"/></circle>
<text x="698" y="247" font-family="'Segoe UI',sans-serif" font-size="12.5" fill="#d1fae5">Anime Enjoyer</text>

<rect x="672" y="282" width="196" height="14" rx="7" fill="#020802"/>
<rect x="672" y="282" width="0" height="14" rx="7" fill="url(#barG2)">
  <animate attributeName="width" from="0" to="176" dur="1.8s" fill="freeze" begin="0.8s"/>
</rect>
<text x="770" y="293" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="9" fill="#fff" opacity="0.9">VIBES: 95%</text>

<circle cx="856" cy="80" r="2.2" fill="#4ade80" opacity="0.8">
  <animateTransform attributeName="transform" type="translate" values="0,0;-6,-18;0,0" dur="4.8s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0.8;0.1;0.8" dur="4.8s" repeatCount="indefinite"/>
</circle>
</svg>
