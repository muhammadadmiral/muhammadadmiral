    <animateTransform attributeName="transform" type="translate" values="0,0;-10,-20;0,0" dur="4.7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.85;0.15;0.85" dur="4.7s" repeatCount="indefinite"/>
  </circle>
