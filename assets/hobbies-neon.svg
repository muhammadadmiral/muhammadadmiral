  </circle>
  <text x="274" y="177" font-family="'Segoe UI',sans-serif" font-size="12.5" fill="#d0f6ff">VALORANT</text>

  <circle cx="260" cy="200" r="3" fill="#00d4ff" filter="url(#neonC3d)">
    <animate attributeName="opacity" values="1;0.3;1" dur="3.0s" repeatCount="indefinite"/>
  </circle>
  <text x="274" y="205" font-family="'Segoe UI',sans-serif" font-size="12.5" fill="#d0f6ff">CS2</text>

  <circle cx="260" cy="228" r="3" fill="#00d4ff" filter="url(#neonC3d)">
    <animate attributeName="opacity" values="1;0.3;1" dur="2.7s" repeatCount="indefinite"/>
  </circle>
  <text x="274" y="233" font-family="'Segoe UI',sans-serif" font-size="12.5" fill="#d0f6ff">Overwatch 2</text>

  <circle cx="260" cy="256" r="3" fill="#00d4ff" filter="url(#neonC3d)">
    <animate attributeName="opacity" values="1;0.3;1" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <text x="274" y="261" font-family="'Segoe UI',sans-serif" font-size="12.5" fill="#d0f6ff">EA Sports FC</text>

  <rect x="248" y="292" width="176" height="18" rx="9" fill="#040810" stroke="#00d4ff" stroke-width="1" stroke-opacity="0.4"/>
  <rect x="250" y="294" width="0" height="14" rx="7" fill="#00d4ff" opacity="0.7">
    <animate attributeName="width" values="0;140;140" keyTimes="0;0.5;1" dur="3s" repeatCount="indefinite" begin="0.5s"/>
  </rect>
  <text x="336" y="305" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="9" fill="#ffffff" opacity="0.9">FRAGGING: 78%</text>

  <circle cx="416" cy="88" r="2.2" fill="#00d4ff" filter="url(#neonC3d)" opacity="0.9">
    <animateTransform attributeName="transform" type="translate" values="0,0;-8,-16;0,0" dur="4.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.9;0.15;0.9" dur="4.2s" repeatCount="indefinite"/>
  </circle>
</g>

<!-- ======= CARD 3: MUSIC (PURPLE) ======= -->
<g>
  <rect x="456" y="78" width="200" height="252" rx="20" fill="#b06ef3" opacity="0.12"/>
  <rect x="452" y="74" width="200" height="252" rx="20" fill="#b06ef3" opacity="0.06"/>
  <rect x="448" y="70" width="200" height="252" rx="20" fill="#060410" stroke="url(#hobbyBorderPu)" stroke-width="2" filter="url(#neonPu3d)"/>
  <rect x="450" y="72" width="196" height="1.5" rx="0.75" fill="#ffffff" opacity="0.2"/>
  <rect x="448" y="70" width="200" height="60" rx="20" fill="#b06ef3" opacity="0.05"/>

  <text x="548" y="118" text-anchor="middle" font-size="32">🎸</text>
  <text x="548" y="146" text-anchor="middle" font-family="'Trebuchet MS',sans-serif" font-size="17" font-weight="900" fill="#d8a0ff" filter="url(#neonPu3d)" letter-spacing="2">MUSIC</text>

  <circle cx="472" cy="172" r="3" fill="#b06ef3" filter="url(#neonPu3d)">
    <animate attributeName="opacity" values="1;0.3;1" dur="2.6s" repeatCount="indefinite"/>
  </circle>
  <text x="486" y="177" font-family="'Segoe UI',sans-serif" font-size="12.5" fill="#ecd8ff">Rock / Pop Rock</text>

  <circle cx="472" cy="200" r="3" fill="#b06ef3" filter="url(#neonPu3d)">
    <animate attributeName="opacity" values="1;0.3;1" dur="3.3s" repeatCount="indefinite"/>
  </circle>
  <text x="486" y="205" font-family="'Segoe UI',sans-serif" font-size="12.5" fill="#ecd8ff">Stratocaster</text>

  <circle cx="472" cy="228" r="3" fill="#b06ef3" filter="url(#neonPu3d)">
    <animate attributeName="opacity" values="1;0.3;1" dur="2.9s" repeatCount="indefinite"/>
  </circle>
  <text x="486" y="233" font-family="'Segoe UI',sans-serif" font-size="12.5" fill="#ecd8ff">Vox AC30 Twang</text>

  <circle cx="472" cy="256" r="3" fill="#b06ef3" filter="url(#neonPu3d)">
    <animate attributeName="opacity" values="1;0.3;1" dur="3.7s" repeatCount="indefinite"/>
  </circle>
  <text x="486" y="261" font-family="'Segoe UI',sans-serif" font-size="12.5" fill="#ecd8ff">0 Gain Tube Screamer</text>

  <rect x="460" y="292" width="176" height="18" rx="9" fill="#06040e" stroke="#b06ef3" stroke-width="1" stroke-opacity="0.4"/>
  <rect x="462" y="294" width="0" height="14" rx="7" fill="#b06ef3" opacity="0.7">
    <animate attributeName="width" values="0;160;160" keyTimes="0;0.5;1" dur="3s" repeatCount="indefinite" begin="1s"/>
  </rect>
  <text x="548" y="305" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="9" fill="#ffffff" opacity="0.9">TONE CHASING: 90%</text>

  <circle cx="628" cy="92" r="1.8" fill="#b06ef3" filter="url(#neonPu3d)" opacity="0.9">
    <animateTransform attributeName="transform" type="translate" values="0,0;6,-18;0,0" dur="5.1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.9;0.2;0.9" dur="5.1s" repeatCount="indefinite"/>
  </circle>
</g>

<!-- ======= CARD 4: LIFESTYLE (MINT) ======= -->
<g>
  <rect x="668" y="78" width="210" height="252" rx="20" fill="#00ff88" opacity="0.10"/>
  <rect x="664" y="74" width="210" height="252" rx="20" fill="#00ff88" opacity="0.05"/>
  <rect x="660" y="70" width="210" height="252" rx="20" fill="#030f06" stroke="url(#hobbyBorderM)" stroke-width="2" filter="url(#neonM3d)"/>
  <rect x="662" y="72" width="206" height="1.5" rx="0.75" fill="#ffffff" opacity="0.2"/>
  <rect x="660" y="70" width="210" height="60" rx="20" fill="#00ff88" opacity="0.04"/>

  <text x="765" y="118" text-anchor="middle" font-size="32">☕</text>
  <text x="765" y="146" text-anchor="middle" font-family="'Trebuchet MS',sans-serif" font-size="14" font-weight="900" fill="#80ffbb" filter="url(#neonM3d)" letter-spacing="2">LIFESTYLE</text>

  <circle cx="684" cy="172" r="3" fill="#00ff88" filter="url(#neonM3d)">
    <animate attributeName="opacity" values="1;0.3;1" dur="2.3s" repeatCount="indefinite"/>
  </circle>
  <text x="698" y="177" font-family="'Segoe UI',sans-serif" font-size="12.5" fill="#c0ffe0">Coffee Addict</text>

  <circle cx="684" cy="200" r="3" fill="#00ff88" filter="url(#neonM3d)">
    <animate attributeName="opacity" values="1;0.3;1" dur="3.1s" repeatCount="indefinite"/>
  </circle>
  <text x="698" y="205" font-family="'Segoe UI',sans-serif" font-size="12.5" fill="#c0ffe0">Late Night Coding</text>

  <circle cx="684" cy="228" r="3" fill="#00ff88" filter="url(#neonM3d)">
    <animate attributeName="opacity" values="1;0.3;1" dur="2.8s" repeatCount="indefinite"/>
  </circle>
  <text x="698" y="233" font-family="'Segoe UI',sans-serif" font-size="12.5" fill="#c0ffe0">Fixing Bugs at 2AM</text>

  <circle cx="684" cy="256" r="3" fill="#00ff88" filter="url(#neonM3d)">
    <animate attributeName="opacity" values="1;0.3;1" dur="4.0s" repeatCount="indefinite"/>
  </circle>
  <text x="698" y="261" font-family="'Segoe UI',sans-serif" font-size="12.5" fill="#c0ffe0">Series Enjoyer</text>

  <rect x="672" y="292" width="186" height="18" rx="9" fill="#020a04" stroke="#00ff88" stroke-width="1" stroke-opacity="0.4"/>
  <rect x="674" y="294" width="0" height="14" rx="7" fill="#00ff88" opacity="0.7">
