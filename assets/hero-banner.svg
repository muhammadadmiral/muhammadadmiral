<svg width="900" height="320" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg">
<defs>
  <!-- Backgrounds -->
  <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#020010"/>
    <stop offset="50%" stop-color="#0a0022"/>
    <stop offset="100%" stop-color="#000818"/>
  </linearGradient>

  <!-- Name gradient — chrome iridescent -->
  <linearGradient id="nameG" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%"   stop-color="#c084fc"/>
    <stop offset="20%"  stop-color="#f0abfc"/>
    <stop offset="40%"  stop-color="#67e8f9"/>
    <stop offset="60%"  stop-color="#a78bfa"/>
    <stop offset="80%"  stop-color="#fb7185"/>
    <stop offset="100%" stop-color="#c084fc"/>
    <animate attributeName="x1" values="0%;-100%;0%" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="100%;200%;100%" dur="6s" repeatCount="indefinite"/>
  </linearGradient>

  <!-- Subtitle gradient -->
  <linearGradient id="subG" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%"   stop-color="#67e8f9" stop-opacity="0.9"/>
    <stop offset="100%" stop-color="#c084fc" stop-opacity="0.9"/>
  </linearGradient>

  <!-- Bar gradient -->
  <linearGradient id="barG" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%"   stop-color="#f0abfc"/>
    <stop offset="50%"  stop-color="#67e8f9"/>
    <stop offset="100%" stop-color="#a3e635"/>
  </linearGradient>

  <!-- Fog blob filter -->
  <filter id="fog" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur stdDeviation="50"/>
  </filter>

  <!-- Text glow — SEPARATE from card border -->
  <filter id="nameGlow" x="-30%" y="-60%" width="160%" height="220%">
    <feGaussianBlur stdDeviation="8" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>

  <!-- Soft drop shadow for 3D depth -->
  <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
    <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#7c3aed" flood-opacity="0.25"/>
    <feDropShadow dx="0" dy="4"  stdDeviation="6"  flood-color="#000000" flood-opacity="0.6"/>
  </filter>

  <!-- Small crisp glow for accents -->
  <filter id="crispGlow" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="4" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>

  <!-- Card border gradient (rotating) -->
  <linearGradient id="cardBorder" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%"   stop-color="#c084fc" stop-opacity="0.8"/>
    <stop offset="33%"  stop-color="#67e8f9" stop-opacity="0.6"/>
    <stop offset="66%"  stop-color="#f472b6" stop-opacity="0.8"/>
    <stop offset="100%" stop-color="#c084fc" stop-opacity="0.8"/>
  </linearGradient>

  <!-- Perspective grid -->
  <pattern id="perspGrid" width="60" height="60" patternUnits="userSpaceOnUse" patternTransform="skewY(-12) scaleY(0.5) translate(0,200)">
    <line x1="60" y1="0"  x2="60"  y2="60" stroke="#c084fc" stroke-width="0.4" opacity="0.18"/>
    <line x1="0"  y1="60" x2="60"  y2="60" stroke="#67e8f9" stroke-width="0.4" opacity="0.18"/>
  </pattern>

  <!-- Shimmer mask -->
  <linearGradient id="shimmer" x1="-100%" y1="0%" x2="200%" y2="0%">
    <stop offset="0%"   stop-color="#ffffff" stop-opacity="0"/>
    <stop offset="50%"  stop-color="#ffffff" stop-opacity="0.12"/>
    <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    <animate attributeName="x1" values="-100%;200%;-100%" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="0%;400%;0%"       dur="4s" repeatCount="indefinite"/>
  </linearGradient>
</defs>

<!-- BG -->
<rect width="900" height="320" fill="url(#bg)"/>

<!-- Perspective grid floor -->
<rect x="0" y="220" width="900" height="100" fill="url(#perspGrid)" opacity="0.7"/>

<!-- Ambient orbs (no filter on text, isolated) -->
<ellipse cx="140" cy="120" rx="200" ry="160" fill="#7c3aed" opacity="0.22" filter="url(#fog)">
  <animate attributeName="cx" values="140;200;140" dur="9s"  repeatCount="indefinite"/>
  <animate attributeName="cy" values="120;160;120" dur="7s"  repeatCount="indefinite"/>
</ellipse>
<ellipse cx="780" cy="200" rx="180" ry="140" fill="#0891b2" opacity="0.18" filter="url(#fog)">
  <animate attributeName="cx" values="780;720;780" dur="10s" repeatCount="indefinite"/>
  <animate attributeName="cy" values="200;160;200" dur="8s"  repeatCount="indefinite"/>
</ellipse>
<ellipse cx="460" cy="290" rx="160" ry="90"  fill="#db2777" opacity="0.12" filter="url(#fog)">
  <animate attributeName="cx" values="460;510;460" dur="11s" repeatCount="indefinite"/>
</ellipse>

<!-- Floating particles -->
<circle cx="80"  cy="60"  r="2.5" fill="#c084fc" filter="url(#crispGlow)" opacity="0.9">
  <animateTransform attributeName="transform" type="translate" values="0,0;8,-20;0,0"  dur="4.1s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0.9;0.3;0.9" dur="4.1s" repeatCount="indefinite"/>
</circle>
<circle cx="820" cy="80"  r="2"   fill="#67e8f9" filter="url(#crispGlow)" opacity="0.85">
  <animateTransform attributeName="transform" type="translate" values="0,0;-6,-18;0,0" dur="5.3s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0.85;0.2;0.85" dur="5.3s" repeatCount="indefinite"/>
</circle>
<circle cx="190" cy="240" r="1.8" fill="#f472b6" filter="url(#crispGlow)" opacity="0.75">
  <animateTransform attributeName="transform" type="translate" values="0,0;-4,-14;0,0" dur="6.2s" repeatCount="indefinite"/>
</circle>
<circle cx="700" cy="260" r="2.2" fill="#a3e635" filter="url(#crispGlow)" opacity="0.7">
  <animateTransform attributeName="transform" type="translate" values="0,0;6,-16;0,0"  dur="3.8s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0.7;0.15;0.7" dur="3.8s" repeatCount="indefinite"/>
</circle>
<circle cx="440" cy="40"  r="1.5" fill="#67e8f9" opacity="0.8">
  <animateTransform attributeName="transform" type="translate" values="0,0;4,-12;0,0"  dur="5.7s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0.8;0.1;0.8" dur="5.7s" repeatCount="indefinite"/>
</circle>

<!-- === MAIN CARD === -->
<!-- Shadow -->
<rect x="60" y="60" width="780" height="210" rx="28" fill="#7c3aed" opacity="0.15" filter="url(#cardShadow)"/>
<!-- Card body -->
<rect x="56" y="56" width="788" height="210" rx="28"
      fill="#08041a" stroke="url(#cardBorder)" stroke-width="1.5"/>
<!-- Top glass highlight -->
<rect x="58" y="58" width="784" height="3"   rx="1.5" fill="#ffffff" opacity="0.15"/>
<!-- Shimmer sweep -->
<rect x="56" y="56" width="788" height="210" rx="28" fill="url(#shimmer)"/>

<!-- === NAME TEXT — shadow layer first, glow on top === -->
<!-- Shadow -->
<text x="452" y="162"
      text-anchor="middle"
      font-family="'Segoe UI','Trebuchet MS',sans-serif"
      font-size="50" font-weight="900" letter-spacing="1"
      fill="#1a0040" opacity="0.6">MUHAMMAD ADMIRAL</text>
<!-- Glow layer -->
<text x="450" y="160"
      text-anchor="middle"
      font-family="'Segoe UI','Trebuchet MS',sans-serif"
      font-size="50" font-weight="900" letter-spacing="1"
      fill="url(#nameG)" filter="url(#nameGlow)">
  MUHAMMAD ADMIRAL
  <animate attributeName="opacity" values="0.9;1;0.9" dur="4s" repeatCount="indefinite"/>
</text>

<!-- Subtitle -->
<text x="450" y="197"
      text-anchor="middle"
      font-family="'Segoe UI',sans-serif"
      font-size="13.5" letter-spacing="3"
      fill="url(#subG)">FULLSTACK DEVELOPER  ·  INTERACTIVE UI ENGINEER  ·  FRAMER MOTION ENJOYER
  <animate attributeName="opacity" values="1;0.7;1" dur="5s" repeatCount="indefinite"/>
</text>

<!-- Animated bar below subtitle -->
<rect x="450" y="214" width="0" height="2.5" rx="1.25" fill="url(#barG)">
  <animate attributeName="width" values="0;300;0"   dur="5s" repeatCount="indefinite"/>
  <animate attributeName="x"     values="450;300;450" dur="5s" repeatCount="indefinite"/>
</rect>

<!-- Corner brackets — solid lines only, no dashes, no rotation -->
<g fill="none" stroke="#c084fc" stroke-width="2" opacity="0.5" filter="url(#crispGlow)">
  <path d="M70 70 L70 90 M70 70 L90 70"/>
  <path d="M830 70 L830 90 M830 70 L810 70"/>
  <path d="M70 260 L70 240 M70 260 L90 260"/>
  <path d="M830 260 L830 240 M830 260 L810 260"/>
  <animate attributeName="opacity" values="0.5;0.8;0.5" dur="3s" repeatCount="indefinite"/>
</g>
</svg>
