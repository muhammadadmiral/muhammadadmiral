<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="valG" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#c084fc"/>
    <stop offset="100%" stop-color="#67e8f9"/>
  </linearGradient>
  <linearGradient id="cardBorder" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#c084fc" stop-opacity="0.8"/>
    <stop offset="50%" stop-color="#67e8f9" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#f472b6" stop-opacity="0.8"/>
    <animateTransform attributeName="gradientTransform" type="rotate" values="0 .5 .5;360 .5 .5" dur="8s" repeatCount="indefinite"/>
  </linearGradient>
  <linearGradient id="shimmer" x1="-100%" y1="0%" x2="200%" y2="0%">
    <stop offset="0%"   stop-color="#ffffff" stop-opacity="0"/>
    <stop offset="50%"  stop-color="#ffffff" stop-opacity="0.06"/>
    <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    <animate attributeName="x1" values="-100%;200%;-100%" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="0%;400%;0%"       dur="5s" repeatCount="indefinite"/>
  </linearGradient>
  <filter id="fog" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="48"/></filter>
  <filter id="cardDepth" x="-8%" y="-8%" width="116%" height="120%">
    <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#7c3aed" flood-opacity="0.22"/>
  </filter>
  <filter id="titleGlow" x="-20%" y="-50%" width="140%" height="200%">
    <feGaussianBlur stdDeviation="6" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="numDepth" x="-15%" y="-20%" width="130%" height="140%">
    <feDropShadow dx="1" dy="3" stdDeviation="4" flood-color="#c084fc" flood-opacity="0.55"/>
  </filter>
  <filter id="dotGlow" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur stdDeviation="3"/>
  </filter>
</defs>
<rect width="900" height="200" fill="#04020e"/>
<ellipse cx="150" cy="150" rx="160" ry="100" fill="#7c3aed" opacity="0.1" filter="url(#fog)">
  <animate attributeName="cx" values="150;210;150" dur="10s" repeatCount="indefinite"/>
</ellipse>
<ellipse cx="780" cy="60" rx="150" ry="90" fill="#0891b2" opacity="0.08" filter="url(#fog)"/>

<text x="450" y="38" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="18" font-weight="800" letter-spacing="2" fill="url(#valG)" filter="url(#titleGlow)">📦 projects.pinned()</text>
<rect x="330" y="45" width="240" height="1.5" rx="0.75" fill="url(#valG)" opacity="0.4"/>


<!-- Card 0 -->
<rect x="20" y="64" width="422" height="152" rx="18" fill="#db2777" opacity="0.12"/>
<rect x="16" y="60" width="422" height="152" rx="18" fill="#10030c">
  <animate attributeName="fill-opacity" values="1;0.95;1" dur="3s" repeatCount="indefinite"/>
</rect>
<rect x="16" y="60" width="422" height="152" rx="18" fill="none" stroke="#f472b6" stroke-width="1.8">
  <!-- no filter on border rect so it doesn't bleed into text -->
</rect>
<rect x="18" y="62" width="418" height="3" rx="1.5" fill="#ffffff" opacity="0.16"/>
<!-- Glow blob under card -->
<ellipse cx="227" cy="136" rx="180" ry="70" fill="#db2777" opacity="0.07" filter="url(#fog)"/>

<text x="40" y="96" font-family="'Segoe UI',sans-serif" font-size="17" font-weight="800" fill="#f9a8d4">Sereluna</text>
<text x="40" y="118" font-family="'Segoe UI',sans-serif" font-size="12" fill="#9ca3af">Capstone Project Bangkit 2024</text>

<!-- Language dot + name -->
<circle cx="40" cy="142" r="5" fill="#A97BFF"/>
<text x="52" y="147" font-family="'Segoe UI',sans-serif" font-size="11.5" fill="#d1d5db">Kotlin</text>

<!-- Stars + forks -->
<text x="40" y="170" font-family="'Segoe UI',sans-serif" font-size="11" fill="#6b7280">⭐ 0  &nbsp;&nbsp;  🍴 0</text>

<!-- Animated accent bar -->
<rect x="40" y="190" width="0" height="2" rx="1" fill="#f472b6" opacity="0.8">
  <animate attributeName="width" from="0" to="374" dur="1.6s" fill="freeze" begin="0s"/>
</rect>

<!-- Card 1 -->
<rect x="466" y="64" width="422" height="152" rx="18" fill="#0891b2" opacity="0.12"/>
<rect x="462" y="60" width="422" height="152" rx="18" fill="#020c10">
  <animate attributeName="fill-opacity" values="1;0.95;1" dur="3.4s" repeatCount="indefinite"/>
</rect>
<rect x="462" y="60" width="422" height="152" rx="18" fill="none" stroke="#67e8f9" stroke-width="1.8">
  <!-- no filter on border rect so it doesn't bleed into text -->
</rect>
<rect x="464" y="62" width="418" height="3" rx="1.5" fill="#ffffff" opacity="0.16"/>
<!-- Glow blob under card -->
<ellipse cx="673" cy="136" rx="180" ry="70" fill="#0891b2" opacity="0.07" filter="url(#fog)"/>

<text x="486" y="96" font-family="'Segoe UI',sans-serif" font-size="17" font-weight="800" fill="#a5f3fc">sereluna-ai-engine</text>
<text x="486" y="118" font-family="'Segoe UI',sans-serif" font-size="12" fill="#9ca3af">No description provided.</text>

<!-- Language dot + name -->
<circle cx="486" cy="142" r="5" fill="#3572A5"/>
<text x="498" y="147" font-family="'Segoe UI',sans-serif" font-size="11.5" fill="#d1d5db">Python</text>

<!-- Stars + forks -->
<text x="486" y="170" font-family="'Segoe UI',sans-serif" font-size="11" fill="#6b7280">⭐ 0  &nbsp;&nbsp;  🍴 0</text>

<!-- Animated accent bar -->
<rect x="486" y="190" width="0" height="2" rx="1" fill="#67e8f9" opacity="0.8">
  <animate attributeName="width" from="0" to="374" dur="1.6s" fill="freeze" begin="0.2s"/>
</rect>

</svg>