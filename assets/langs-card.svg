<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="bgL" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#02080f"/>
    <stop offset="100%" stop-color="#001020"/>
  </linearGradient>
  <linearGradient id="langBorder" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#00d4ff"/>
    <stop offset="50%" stop-color="#0080ff"/>
    <stop offset="100%" stop-color="#00ff88"/>
    <animateTransform attributeName="gradientTransform" type="rotate" values="0 0.5 0.5;360 0.5 0.5" dur="8s" repeatCount="indefinite"/>
  </linearGradient>
  <filter id="fogL" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="35"/>
  </filter>
  <filter id="glowL" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur stdDeviation="5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="depth3dL" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#00d4ff" flood-opacity="0.5"/>
  </filter>
</defs>

<rect width="900" height="200" fill="url(#bgL)"/>

<!-- Ambient blobs -->
<ellipse cx="100" cy="50" rx="120" ry="80" fill="#00d4ff" opacity="0.12" filter="url(#fogL)">
  <animate attributeName="cx" values="100;160;100" dur="9s" repeatCount="indefinite"/>
</ellipse>
<ellipse cx="820" cy="160" rx="130" ry="80" fill="#00ff88" opacity="0.10" filter="url(#fogL)">
  <animate attributeName="cy" values="160;120;160" dur="7s" repeatCount="indefinite"/>
</ellipse>

<!-- 3D shadow layers -->
<rect x="18" y="18" width="864" height="170" rx="20" fill="#00d4ff" opacity="0.07"/>
<rect x="14" y="14" width="872" height="174" rx="21" fill="#00ff88" opacity="0.03"/>
<!-- Main card -->
<rect x="10" y="10" width="880" height="178" rx="22" fill="#03090e" stroke="url(#langBorder)" stroke-width="1.5"/>
<rect x="12" y="12" width="876" height="2" rx="1" fill="#ffffff" opacity="0.18"/>

<!-- Title -->
<text x="450" y="46" text-anchor="middle" font-family="'Trebuchet MS','Segoe UI',sans-serif" font-size="16" font-weight="900" fill="#00d4ff" filter="url(#glowL)" letter-spacing="2">MOST USED LANGUAGES</text>

<!-- ======= Language bars with 3D effect ======= -->
<!-- Data: TypeScript ~35%, JavaScript ~25%, Python ~15%, Kotlin ~12%, CSS ~8%, Other ~5% -->

<!-- TypeScript -->
<g transform="translate(28,62)">
  <text x="0" y="0" font-family="'Segoe UI',sans-serif" font-size="12" fill="#3178c6" font-weight="700">TypeScript</text>
  <text x="120" y="0" font-family="'Segoe UI',sans-serif" font-size="11" fill="#6090aa">35.2%</text>
  <rect x="0" y="6" width="800" height="12" rx="6" fill="#0a1420" opacity="0.8"/>
  <!-- 3D bar shadow -->
  <rect x="2" y="8" width="0" height="8" rx="4" fill="#3178c6" opacity="0.3">
    <animate attributeName="width" values="0;274;274" keyTimes="0;0.6;1" dur="3s" repeatCount="indefinite" begin="0s"/>
  </rect>
  <!-- Main bar -->
  <rect x="0" y="6" width="0" height="12" rx="6" fill="#3178c6">
    <animate attributeName="width" values="0;281;281" keyTimes="0;0.6;1" dur="3s" repeatCount="indefinite" begin="0s"/>
  </rect>
  <!-- Shimmer -->
  <rect x="0" y="6" width="30" height="12" rx="6" fill="#ffffff" opacity="0.25">
    <animate attributeName="x" values="-30;285;-30" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.3;0" dur="3.5s" repeatCount="indefinite"/>
  </rect>
</g>

<!-- JavaScript -->
<g transform="translate(28,94)">
  <text x="0" y="0" font-family="'Segoe UI',sans-serif" font-size="12" fill="#f7df1e" font-weight="700">JavaScript</text>
  <text x="120" y="0" font-family="'Segoe UI',sans-serif" font-size="11" fill="#8a8060">25.1%</text>
  <rect x="0" y="6" width="800" height="12" rx="6" fill="#0a0d04" opacity="0.8"/>
  <rect x="2" y="8" width="0" height="8" rx="4" fill="#f7df1e" opacity="0.25">
    <animate attributeName="width" values="0;199;199" keyTimes="0;0.6;1" dur="3s" repeatCount="indefinite" begin="0.3s"/>
  </rect>
  <rect x="0" y="6" width="0" height="12" rx="6" fill="#f7df1e">
    <animate attributeName="width" values="0;201;201" keyTimes="0;0.6;1" dur="3s" repeatCount="indefinite" begin="0.3s"/>
  </rect>
  <rect x="0" y="6" width="30" height="12" rx="6" fill="#ffffff" opacity="0.2">
    <animate attributeName="x" values="-30;205;-30" dur="3.8s" repeatCount="indefinite" begin="0.3s"/>
    <animate attributeName="opacity" values="0;0.25;0" dur="3.8s" repeatCount="indefinite"/>
  </rect>
</g>

<!-- Python -->
<g transform="translate(28,126)">
  <text x="0" y="0" font-family="'Segoe UI',sans-serif" font-size="12" fill="#3776ab" font-weight="700">Python</text>
  <text x="120" y="0" font-family="'Segoe UI',sans-serif" font-size="11" fill="#506070">15.3%</text>
  <rect x="0" y="6" width="800" height="12" rx="6" fill="#040810" opacity="0.8"/>
  <rect x="2" y="8" width="0" height="8" rx="4" fill="#3776ab" opacity="0.3">
    <animate attributeName="width" values="0;120;120" keyTimes="0;0.6;1" dur="3s" repeatCount="indefinite" begin="0.6s"/>
  </rect>
  <rect x="0" y="6" width="0" height="12" rx="6" fill="#3776ab">
    <animate attributeName="width" values="0;122;122" keyTimes="0;0.6;1" dur="3s" repeatCount="indefinite" begin="0.6s"/>
  </rect>
</g>

<!-- Kotlin -->
<g transform="translate(28,158)">
  <text x="0" y="0" font-family="'Segoe UI',sans-serif" font-size="12" fill="#7f52ff" font-weight="700">Kotlin</text>
  <text x="120" y="0" font-family="'Segoe UI',sans-serif" font-size="11" fill="#605080">12.1%</text>
  <rect x="0" y="6" width="800" height="12" rx="6" fill="#060410" opacity="0.8"/>
  <rect x="2" y="8" width="0" height="8" rx="4" fill="#7f52ff" opacity="0.3">
    <animate attributeName="width" values="0;95;95" keyTimes="0;0.6;1" dur="3s" repeatCount="indefinite" begin="0.9s"/>
  </rect>
  <rect x="0" y="6" width="0" height="12" rx="6" fill="#7f52ff">
    <animate attributeName="width" values="0;97;97" keyTimes="0;0.6;1" dur="3s" repeatCount="indefinite" begin="0.9s"/>
  </rect>
</g>

<!-- Right side: CSS + C stats compact -->
<g transform="translate(700,62)">
  <text x="0" y="0" font-family="'Segoe UI',sans-serif" font-size="11" fill="#264de4" font-weight="700">CSS</text>
  <text x="60" y="0" font-family="'Segoe UI',sans-serif" font-size="10" fill="#506">8.2%</text>
  <rect x="0" y="6" width="170" height="10" rx="5" fill="#050510" opacity="0.8"/>
  <rect x="0" y="6" width="0" height="10" rx="5" fill="#264de4">
    <animate attributeName="width" values="0;65;65" keyTimes="0;0.6;1" dur="3s" repeatCount="indefinite" begin="1.2s"/>
  </rect>
</g>
<g transform="translate(700,94)">
  <text x="0" y="0" font-family="'Segoe UI',sans-serif" font-size="11" fill="#a0a0a0" font-weight="700">C</text>
  <text x="60" y="0" font-family="'Segoe UI',sans-serif" font-size="10" fill="#555">4.1%</text>
  <rect x="0" y="6" width="170" height="10" rx="5" fill="#050508" opacity="0.8"/>
  <rect x="0" y="6" width="0" height="10" rx="5" fill="#a8a8c0">
    <animate attributeName="width" values="0;33;33" keyTimes="0;0.6;1" dur="3s" repeatCount="indefinite" begin="1.5s"/>
  </rect>
</g>
</svg>
