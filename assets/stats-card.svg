<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="bgS" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#0a0214"/>
    <stop offset="100%" stop-color="#080018"/>
  </linearGradient>
  <linearGradient id="statBorder" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#ff1cf7"/>
    <stop offset="50%" stop-color="#7040ff"/>
    <stop offset="100%" stop-color="#00d4ff"/>
    <animateTransform attributeName="gradientTransform" type="rotate" values="0 0.5 0.5;360 0.5 0.5" dur="6s" repeatCount="indefinite"/>
  </linearGradient>
  <linearGradient id="numG" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#ff1cf7"/>
    <stop offset="100%" stop-color="#00d4ff"/>
  </linearGradient>
  <linearGradient id="orbitG" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#ff1cf7" stop-opacity="0"/>
    <stop offset="50%" stop-color="#00d4ff"/>
    <stop offset="100%" stop-color="#ff1cf7" stop-opacity="0"/>
  </linearGradient>
  <filter id="fogS" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="35"/>
  </filter>
  <filter id="glowS" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur stdDeviation="8" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glowSmS" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="4" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="depth3dS" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#ff1cf7" flood-opacity="0.5"/>
  </filter>
</defs>

<rect width="900" height="200" fill="url(#bgS)"/>

<!-- Ambient blobs -->
<ellipse cx="80" cy="160" rx="140" ry="90" fill="#ff1cf7" opacity="0.14" filter="url(#fogS)">
  <animate attributeName="cx" values="80;140;80" dur="8s" repeatCount="indefinite"/>
</ellipse>
<ellipse cx="840" cy="50" rx="130" ry="80" fill="#00d4ff" opacity="0.12" filter="url(#fogS)">
  <animate attributeName="cy" values="50;80;50" dur="7s" repeatCount="indefinite"/>
</ellipse>

<!-- Shadow layers (3D) -->
<rect x="18" y="18" width="864" height="170" rx="20" fill="#ff1cf7" opacity="0.08"/>
<rect x="14" y="14" width="872" height="174" rx="21" fill="#00d4ff" opacity="0.04"/>
<!-- Main card -->
<rect x="10" y="10" width="880" height="178" rx="22" fill="#09050f" stroke="url(#statBorder)" stroke-width="1.5"/>
<rect x="12" y="12" width="876" height="2" rx="1" fill="#ffffff" opacity="0.18"/>
<rect x="12" y="12" width="2" height="174" rx="1" fill="#ffffff" opacity="0.08"/>

<!-- Avatar / GitHub icon area with orbit -->
<g transform="translate(72,100)">
  <!-- 3D orbit rings -->
  <ellipse cx="0" cy="0" rx="38" ry="12" fill="none" stroke="url(#orbitG)" stroke-width="1.2" opacity="0.6">
    <animateTransform attributeName="transform" type="rotate" values="0;360" dur="6s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="0" cy="0" rx="38" ry="12" fill="none" stroke="url(#orbitG)" stroke-width="0.8" opacity="0.4" transform="rotate(60)">
    <animateTransform attributeName="transform" type="rotate" values="60;420" dur="9s" repeatCount="indefinite"/>
  </ellipse>
  <!-- GitHub octocat simplified icon circle -->
  <circle cx="0" cy="0" r="26" fill="#1a0a2a" stroke="#ff1cf7" stroke-width="1.8" filter="url(#glowSmS)"/>
  <text x="0" y="9" text-anchor="middle" font-size="26" fill="#ffffff">⬡</text>
  <!-- Orbiting dot -->
  <circle cx="38" cy="0" r="3" fill="#ff1cf7" filter="url(#glowSmS)">
    <animateTransform attributeName="transform" type="rotate" values="0 0 0;360 0 0" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="-38" cy="0" r="2.5" fill="#00d4ff" filter="url(#glowSmS)">
    <animateTransform attributeName="transform" type="rotate" values="0 0 0;360 0 0" dur="6s" repeatCount="indefinite"/>
  </circle>
</g>

<!-- Username -->
<text x="136" y="46" font-family="'Trebuchet MS','Segoe UI',sans-serif" font-size="18" font-weight="900" fill="#ffffff" filter="url(#glowSmS)">muhammadadmiral</text>
<text x="136" y="66" font-family="'Segoe UI',sans-serif" font-size="12" fill="#9080cc" letter-spacing="1">GITHUB STATS CARD</text>

<!-- Stats grid (4 stats) -->
<!-- Stars -->
<g transform="translate(136,90)">
  <text x="0" y="0" font-family="'Segoe UI',sans-serif" font-size="11" fill="#888" letter-spacing="0.5">TOTAL STARS EARNED</text>
  <text x="2" y="22" font-family="'Trebuchet MS',sans-serif" font-size="22" font-weight="900" fill="url(#numG)" filter="url(#depth3dS)">0</text>
  <text x="0" y="0" font-size="11" fill="#ffcc00" opacity="0.8">⭐</text>
</g>

<!-- Commits -->
<g transform="translate(290,90)">
  <text x="0" y="0" font-family="'Segoe UI',sans-serif" font-size="11" fill="#888" letter-spacing="0.5">TOTAL COMMITS (2025)</text>
  <text x="2" y="22" font-family="'Trebuchet MS',sans-serif" font-size="22" font-weight="900" fill="url(#numG)" filter="url(#depth3dS)">100+</text>
</g>

<!-- PRs -->
<g transform="translate(460,90)">
  <text x="0" y="0" font-family="'Segoe UI',sans-serif" font-size="11" fill="#888" letter-spacing="0.5">TOTAL PRs</text>
  <text x="2" y="22" font-family="'Trebuchet MS',sans-serif" font-size="22" font-weight="900" fill="url(#numG)" filter="url(#depth3dS)">10+</text>
</g>

<!-- Repos -->
<g transform="translate(590,90)">
  <text x="0" y="0" font-family="'Segoe UI',sans-serif" font-size="11" fill="#888" letter-spacing="0.5">PUBLIC REPOS</text>
  <text x="2" y="22" font-family="'Trebuchet MS',sans-serif" font-size="22" font-weight="900" fill="url(#numG)" filter="url(#depth3dS)">21</text>
</g>

<!-- Rank badge (3D) -->
<g transform="translate(770,100)">
  <!-- 3D shadow -->
  <rect x="4" y="4" width="94" height="50" rx="12" fill="#ff1cf7" opacity="0.3"/>
  <rect x="0" y="0" width="94" height="50" rx="12" fill="#1a0825" stroke="#ff1cf7" stroke-width="1.5" filter="url(#glowSmS)"/>
  <text x="47" y="18" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="10" fill="#ff9ef9" letter-spacing="1">RANK</text>
  <text x="47" y="40" text-anchor="middle" font-family="'Trebuchet MS',sans-serif" font-size="24" font-weight="900" fill="#ffffff" filter="url(#depth3dS)">B+</text>
  <!-- Rotating ring -->
  <circle cx="47" cy="25" r="28" fill="none" stroke="#ff1cf7" stroke-width="1" stroke-dasharray="12 4" opacity="0.5">
    <animateTransform attributeName="transform" type="rotate" values="0 47 25;360 47 25" dur="8s" repeatCount="indefinite"/>
  </circle>
</g>

<!-- Bottom divider with animated sweep -->
<rect x="136" y="152" width="0" height="1.5" rx="0.75" fill="url(#statBorder)" opacity="0.6">
  <animate attributeName="width" values="0;630;0" dur="5s" repeatCount="indefinite"/>
</rect>
</svg>
