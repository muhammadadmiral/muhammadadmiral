<svg width="900" height="290" viewBox="0 0 900 290" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
<defs>
  <linearGradient id="gPrimary" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#c084fc"/>
    <stop offset="100%" stop-color="#67e8f9"/>
  </linearGradient>
  <linearGradient id="gBorder" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%"   stop-color="#c084fc" stop-opacity="0.95"/>
    <stop offset="40%"  stop-color="#67e8f9" stop-opacity="0.65"/>
    <stop offset="100%" stop-color="#f472b6" stop-opacity="0.95"/>
    <animateTransform attributeName="gradientTransform" type="rotate"
      values="0 .5 .5;360 .5 .5" dur="5s" repeatCount="indefinite"/>
  </linearGradient>
  <linearGradient id="gShimmer" x1="-100%" y1="0%" x2="200%" y2="0%">
    <stop offset="0%"   stop-color="#ffffff" stop-opacity="0"/>
    <stop offset="50%"  stop-color="#ffffff" stop-opacity="0.07"/>
    <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    <animate attributeName="x1" values="-100%;200%;-100%" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="0%;400%;0%"       dur="4s" repeatCount="indefinite"/>
  </linearGradient>
  <linearGradient id="gFire" x1="0%" y1="100%" x2="0%" y2="0%">
    <stop offset="0%"   stop-color="#dc2626"/>
    <stop offset="35%"  stop-color="#ea580c"/>
    <stop offset="70%"  stop-color="#fbbf24"/>
    <stop offset="100%" stop-color="#fef08a"/>
  </linearGradient>
  <linearGradient id="gRank" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%"   stop-color="#f472b6"/>
    <stop offset="50%"  stop-color="#c084fc"/>
    <stop offset="100%" stop-color="#67e8f9"/>
  </linearGradient>
  <filter id="fFog" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="42"/>
  </filter>
  <filter id="fCard" x="-8%" y="-8%" width="116%" height="122%">
    <feDropShadow dx="0"  dy="6"  stdDeviation="10" flood-color="#7c3aed" flood-opacity="0.28"/>
    <feDropShadow dx="0"  dy="20" stdDeviation="30" flood-color="#000000" flood-opacity="0.55"/>
  </filter>
  <filter id="fGlow" x="-25%" y="-60%" width="150%" height="220%">
    <feGaussianBlur stdDeviation="9" result="b1"/>
    <feGaussianBlur stdDeviation="4" result="b2"/>
    <feMerge><feMergeNode in="b1"/><feMergeNode in="b2"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="fNumGlow" x="-20%" y="-25%" width="140%" height="150%">
    <feGaussianBlur stdDeviation="6" result="b"/>
    <feFlood flood-color="#c084fc" result="c"/>
    <feComposite in="c" in2="b" operator="in" result="g"/>
    <feMerge><feMergeNode in="g"/><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="fDot" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur stdDeviation="2.5"/>
  </filter>
  <filter id="fFireGlow" x="-100%" y="-100%" width="300%" height="300%">
    <feGaussianBlur stdDeviation="14" result="b"/>
    <feFlood flood-color="#ea580c" result="c"/>
    <feComposite in="c" in2="b" operator="in" result="g"/>
    <feMerge><feMergeNode in="g"/><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="fSnake" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur stdDeviation="4" result="b"/>
    <feFlood flood-color="#4ade80" result="c"/>
    <feComposite in="c" in2="b" operator="in" result="g"/>
    <feMerge><feMergeNode in="g"/><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="fHead" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur stdDeviation="6" result="b"/>
    <feFlood flood-color="#86efac" result="c"/>
    <feComposite in="c" in2="b" operator="in" result="g"/>
    <feMerge><feMergeNode in="g"/><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="fGold" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="5" result="b"/>
    <feFlood flood-color="#fbbf24" result="c"/>
    <feComposite in="c" in2="b" operator="in" result="g"/>
    <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="fLineGlow" x="-10%" y="-40%" width="120%" height="180%">
    <feGaussianBlur stdDeviation="3" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>

  <radialGradient id="gAvatar" cx="40%" cy="35%" r="60%">
    <stop offset="0%"   stop-color="#2d0966"/>
    <stop offset="100%" stop-color="#0a0220"/>
  </radialGradient>
</defs>
<rect width="900" height="290" fill="#030010"/>
<ellipse cx="108" cy="218"
  rx="180" ry="160"
  fill="#7c3aed" opacity="0.16" filter="url(#fFog)">
  <animate attributeName="cx" values="108;171;108" dur="9s" repeatCount="indefinite"/>
</ellipse>
<ellipse cx="792" cy="64"
  rx="162" ry="131"
  fill="#0891b2" opacity="0.12" filter="url(#fFog)">
  <animate attributeName="cy" values="64;110;64" dur="7s" repeatCount="indefinite"/>
</ellipse>
<ellipse cx="450" cy="261"
  rx="126" ry="81"
  fill="#db2777" opacity="0.07" filter="url(#fFog)">
  <animate attributeName="opacity" values="0.07;0.12;0.07" dur="5.5s" repeatCount="indefinite"/>
</ellipse>

<rect x="57"   y="21"   width="800" height="262" rx="24" fill="#0a0318" opacity="0.92"/>
<rect x="53.5" y="17.5" width="800" height="262" rx="24" fill="#06011a"  opacity="0.70"/>
<rect x="50"     y="14"     width="800" height="262" rx="24" fill="#07031a"
      stroke="url(#gBorder)" stroke-width="1.6" filter="url(#fCard)"/>
<rect x="52"   y="16"   width="796" height="3.5" rx="1.75" fill="#ffffff" opacity="0.13"/>
<rect x="52"   y="272" width="796" height="2"   rx="1"    fill="#000000" opacity="0.22"/>
<rect x="50"     y="14"     width="800" height="262" rx="24"   fill="url(#gShimmer)"/>

<text x="450" y="54" text-anchor="middle"
  font-family="'Segoe UI',system-ui,sans-serif" font-size="15" font-weight="800"
  letter-spacing="3" fill="url(#gPrimary)" filter="url(#fGlow)">📊 GITHUB STATS — @muhammadadmiral</text>

<line x1="204" y1="28" x2="204" y2="266" stroke="#c084fc" stroke-width="0.7"
  stroke-dasharray="3 5" opacity="0.2"/>

<!-- Avatar outer pulse ring -->
<circle cx="124" cy="152" r="62" fill="none" stroke="#c084fc" stroke-width="0.8" opacity="0.2">
  <animate attributeName="r"       values="60;66;60"    dur="3.2s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0.2;0.5;0.2" dur="3.2s" repeatCount="indefinite"/>
</circle>
<circle cx="124" cy="152" r="52" fill="url(#gAvatar)" stroke="#c084fc" stroke-width="1.6"/>
<text x="124" y="167" text-anchor="middle" font-size="46" opacity="0.85">⬡</text>
<!-- Orbital ring 1 -->
<ellipse cx="124" cy="152" rx="72" ry="22" fill="none"
  stroke="#c084fc" stroke-width="1" opacity="0.3" stroke-dasharray="4 4">
  <animateTransform attributeName="transform" type="rotate"
    values="0 124 152;360 124 152" dur="8s" repeatCount="indefinite"/>
</ellipse>
<circle cx="196" cy="152" r="4.5" fill="#f472b6" filter="url(#fDot)">
  <animateTransform attributeName="transform" type="rotate"
    values="0 124 152;360 124 152" dur="8s" repeatCount="indefinite"/>
</circle>
<!-- Orbital ring 2 -->
<ellipse cx="124" cy="152" rx="60" ry="16" fill="none"
  stroke="#67e8f9" stroke-width="0.8" opacity="0.2">
  <animateTransform attributeName="transform" type="rotate"
    values="60 124 152;-300 124 152" dur="5s" repeatCount="indefinite"/>
</ellipse>
<circle cx="184" cy="152" r="3" fill="#67e8f9" opacity="0.85" filter="url(#fDot)">
  <animateTransform attributeName="transform" type="rotate"
    values="60 124 152;-300 124 152" dur="5s" repeatCount="indefinite"/>
</circle>
<circle cx="64"  cy="152" r="2.5" fill="#c084fc" opacity="0.6" filter="url(#fDot)">
  <animateTransform attributeName="transform" type="rotate"
    values="180 124 152;-180 124 152" dur="6.5s" repeatCount="indefinite"/>
</circle>

<text x="124" y="220" text-anchor="middle"
  font-family="'Segoe UI',system-ui,sans-serif" font-size="12.5" font-weight="800"
  fill="#e2e8f0">muhammadadmiral</text>
<text x="124" y="237" text-anchor="middle"
  font-family="'Segoe UI',system-ui,sans-serif" font-size="9.5" fill="#9ca3af">React / NestJS Developer</text>
<text x="124" y="254" text-anchor="middle"
  font-family="'Segoe UI',system-ui,sans-serif" font-size="9" fill="#6b7280">Since Dec 11, 2023</text>


<g transform="translate(222,76)">
  <text x="0" y="0" font-family="'Segoe UI',system-ui,sans-serif"
    font-size="9.5" fill="#6b7280" letter-spacing="0.8">⭐ TOTAL STARS</text>
  <text x="0" y="30" font-family="'Segoe UI',system-ui,sans-serif"
    font-size="32" font-weight="900" fill="url(#gPrimary)" filter="url(#fNumGlow)">0</text>
</g>
<g transform="translate(362,76)">
  <text x="0" y="0" font-family="'Segoe UI',system-ui,sans-serif"
    font-size="9.5" fill="#6b7280" letter-spacing="0.8">📝 COMMITS (yr)</text>
  <text x="0" y="30" font-family="'Segoe UI',system-ui,sans-serif"
    font-size="32" font-weight="900" fill="url(#gPrimary)" filter="url(#fNumGlow)">0</text>
</g>
<g transform="translate(502,76)">
  <text x="0" y="0" font-family="'Segoe UI',system-ui,sans-serif"
    font-size="9.5" fill="#6b7280" letter-spacing="0.8">🔀 PULL REQUESTS</text>
  <text x="0" y="30" font-family="'Segoe UI',system-ui,sans-serif"
    font-size="32" font-weight="900" fill="url(#gPrimary)" filter="url(#fNumGlow)">0</text>
</g>
<g transform="translate(644,76)">
  <text x="0" y="0" font-family="'Segoe UI',system-ui,sans-serif"
    font-size="9.5" fill="#6b7280" letter-spacing="0.8">🐛 ISSUES OPENED</text>
  <text x="0" y="30" font-family="'Segoe UI',system-ui,sans-serif"
    font-size="32" font-weight="900" fill="url(#gPrimary)" filter="url(#fNumGlow)">0</text>
</g>


<g transform="translate(222,163)">
  <text x="0" y="0" font-family="'Segoe UI',system-ui,sans-serif"
    font-size="9.5" fill="#6b7280" letter-spacing="0.8">📦 PUBLIC REPOS</text>
  <text x="0" y="30" font-family="'Segoe UI',system-ui,sans-serif"
    font-size="32" font-weight="900" fill="url(#gPrimary)" filter="url(#fNumGlow)">21</text>
</g>
<g transform="translate(400,163)">
  <text x="0" y="0" font-family="'Segoe UI',system-ui,sans-serif"
    font-size="9.5" fill="#6b7280" letter-spacing="0.8">👥 FOLLOWERS</text>
  <text x="0" y="30" font-family="'Segoe UI',system-ui,sans-serif"
    font-size="32" font-weight="900" fill="url(#gPrimary)" filter="url(#fNumGlow)">14</text>
</g>
<g transform="translate(578,163)">
  <text x="0" y="0" font-family="'Segoe UI',system-ui,sans-serif"
    font-size="9.5" fill="#6b7280" letter-spacing="0.8">🔥 CONTRIBUTIONS</text>
  <text x="0" y="30" font-family="'Segoe UI',system-ui,sans-serif"
    font-size="32" font-weight="900" fill="url(#gPrimary)" filter="url(#fNumGlow)">0</text>
</g>

<!-- Rank badge -->
<g transform="translate(768,82)">
  <circle cx="46" cy="52" r="52" fill="#0a0220" opacity="0.8"/>
  <circle cx="46" cy="52" r="42" fill="none" stroke="#1a0540" stroke-width="6"/>
  <circle cx="46" cy="52" r="42" fill="none" stroke="url(#gRank)" stroke-width="5.5"
    stroke-dasharray="53 264" stroke-linecap="round"
    transform="rotate(-90 46 52)" opacity="0.92">
    <animate attributeName="stroke-dasharray"
      values="0 264;53 264" dur="1.8s" fill="freeze" begin="0.2s"/>
  </circle>
  <circle cx="46" cy="52" r="33" fill="#07031a" stroke="#c084fc" stroke-width="0.5" opacity="0.6"/>
  <text x="46" y="43" text-anchor="middle"
    font-family="'Segoe UI',system-ui,sans-serif" font-size="9" fill="#9ca3af" letter-spacing="2">RANK</text>
  <text x="46" y="70" text-anchor="middle"
    font-family="'Segoe UI',system-ui,sans-serif" font-size="27" font-weight="900"
    fill="#ffffff" filter="url(#fNumGlow)">C</text>
  <text x="46" y="85" text-anchor="middle"
    font-family="'Segoe UI',system-ui,sans-serif" font-size="9" fill="#6b7280">Top 20%</text>
  <circle cx="88" cy="52" r="3" fill="#f472b6" filter="url(#fDot)">
    <animateTransform attributeName="transform" type="rotate"
      values="0 46 52;360 46 52" dur="9s" repeatCount="indefinite"/>
  </circle>
  <circle cx="4"  cy="52" r="2.2" fill="#67e8f9" filter="url(#fDot)">
    <animateTransform attributeName="transform" type="rotate"
      values="0 46 52;-360 46 52" dur="6s" repeatCount="indefinite"/>
  </circle>
</g>

<!-- Floating sparkles -->
<circle cx="260" cy="26" r="1.6" fill="#c084fc" opacity="0.7">
  <animate attributeName="opacity" values="0.7;0.1;0.7" dur="3.3s" repeatCount="indefinite"/>
  <animateTransform attributeName="transform" type="translate" values="0,0;4,-8;0,0" dur="3.3s" repeatCount="indefinite"/>
</circle>
<circle cx="550" cy="22" r="2" fill="#67e8f9" opacity="0.6">
  <animate attributeName="opacity" values="0.6;0.1;0.6" dur="2.8s" repeatCount="indefinite" begin="0.6s"/>
  <animateTransform attributeName="transform" type="translate" values="0,0;-5,-9;0,0" dur="2.8s" repeatCount="indefinite" begin="0.6s"/>
</circle>
<circle cx="700" cy="28" r="1.4" fill="#f472b6" opacity="0.8">
  <animate attributeName="opacity" values="0.8;0.1;0.8" dur="4s" repeatCount="indefinite" begin="1.2s"/>
  <animateTransform attributeName="transform" type="translate" values="0,0;3,-7;0,0" dur="4s" repeatCount="indefinite" begin="1.2s"/>
</circle>
</svg>