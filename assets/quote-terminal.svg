<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
<defs>
  <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
    <rect width="4" height="2" fill="#ffffff" opacity="0.035"/>
  </pattern>
  <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
    <stop offset="60%" stop-color="#000000" stop-opacity="0"/>
    <stop offset="100%" stop-color="#000000" stop-opacity="0.55"/>
  </radialGradient>
  <filter id="termGlow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="5"/>
  </filter>
</defs>

<rect x="0" y="0" width="900" height="200" rx="14" fill="#020402"/>
<rect x="2" y="2" width="896" height="196" rx="12" fill="none" stroke="#39ff9d" stroke-width="1.5" opacity="0.7" filter="url(#termGlow)"/>
<rect x="2" y="2" width="896" height="196" rx="12" fill="none" stroke="#39ff9d" stroke-width="1"/>

<text x="40" y="60" font-family="'Courier New',monospace" font-size="15" fill="#4d5a4d">guest@admiral<tspan fill="#39ff9d">:~$</tspan> cat favorite_quote.txt</text>
<text x="40" y="95" font-family="'Courier New',monospace" font-size="17" fill="#39ff9d" font-weight="700">"train to failure."</text>
<text x="40" y="120" font-family="'Courier New',monospace" font-size="15" fill="#8effc0">— Sam Sulek</text>
<text x="40" y="155" font-family="'Courier New',monospace" font-size="15" fill="#4d5a4d">guest@admiral<tspan fill="#39ff9d">:~$</tspan></text>
<rect x="228" y="142" width="10" height="17" fill="#39ff9d">
  <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.51;1" dur="1.1s" repeatCount="indefinite"/>
</rect>

<rect x="0" y="0" width="900" height="200" rx="14" fill="url(#scanlines)"/>
<rect x="0" y="0" width="900" height="200" rx="14" fill="url(#vignette)"/>
</svg>
