<path d="M 44.0,170.0 L 60.0,170.0 L 75.9,170.0 L 91.9,170.0 L 107.8,170.0 L 123.8,170.0 L 139.8,170.0 L 155.7,170.0 L 171.7,170.0 L 187.6,170.0 L 203.6,170.0 L 219.6,170.0 L 235.5,170.0 L 251.5,170.0 L 267.5,170.0 L 283.4,170.0 L 299.4,170.0 L 315.3,170.0 L 331.3,170.0 L 347.3,170.0 L 363.2,170.0 L 379.2,170.0 L 395.1,170.0 L 411.1,170.0 L 427.1,170.0 L 443.0,170.0 L 459.0,170.0 L 474.9,170.0 L 490.9,170.0 L 506.9,170.0 L 522.8,170.0 L 538.8,170.0 L 554.7,170.0 L 570.7,170.0 L 586.7,170.0 L 602.6,170.0 L 618.6,170.0 L 634.5,170.0 L 650.5,170.0 L 666.5,170.0 L 682.4,170.0 L 698.4,170.0 L 714.4,170.0 L 730.3,170.0 L 746.3,170.0 L 762.2,170.0 L 778.2,170.0 L 794.2,170.0 L 810.1,170.0 L 826.1,170.0 L 842.0,170.0 L 858.0,170.0 L 858,170 L 44,170 Z" fill="url(#gArea2)" opacity="0.5"/>
