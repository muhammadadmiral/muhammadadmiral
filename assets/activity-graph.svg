<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="bgA" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#020810"/>
    <stop offset="100%" stop-color="#000c1c"/>
  </linearGradient>
  <linearGradient id="actBorder" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#00d4ff"/>
    <stop offset="50%" stop-color="#7040ff"/>
    <stop offset="100%" stop-color="#00ff88"/>
    <animateTransform attributeName="gradientTransform" type="rotate" values="0 0.5 0.5;360 0.5 0.5" dur="7s" repeatCount="indefinite"/>
  </linearGradient>
  <linearGradient id="graphFill" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="graphFill2" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#7040ff" stop-opacity="0.4"/>
    <stop offset="100%" stop-color="#7040ff" stop-opacity="0"/>
  </linearGradient>
  <filter id="fogA" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="35"/>
  </filter>
  <filter id="glowA" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur stdDeviation="5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="lineGlowA" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="3" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="depth3dA" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#00d4ff" flood-opacity="0.5"/>
  </filter>
  <!-- Grid pattern -->
  <pattern id="graphGrid" width="58" height="30" patternUnits="userSpaceOnUse">
    <line x1="0" y1="0" x2="0" y2="160" stroke="#00d4ff" stroke-width="0.3" opacity="0.12"/>
    <line x1="0" y1="30" x2="860" y2="30" stroke="#00d4ff" stroke-width="0.3" opacity="0.12"/>
  </pattern>
</defs>

<rect width="900" height="200" fill="url(#bgA)"/>

<!-- Ambient blobs -->
<ellipse cx="200" cy="160" rx="200" ry="100" fill="#00d4ff" opacity="0.09" filter="url(#fogA)">
  <animate attributeName="cx" values="200;280;200" dur="10s" repeatCount="indefinite"/>
</ellipse>
<ellipse cx="750" cy="50" rx="180" ry="90" fill="#7040ff" opacity="0.08" filter="url(#fogA)">
  <animate attributeName="cy" values="50;80;50" dur="8s" repeatCount="indefinite"/>
</ellipse>

<!-- Card 3D shadows -->
<rect x="18" y="18" width="864" height="170" rx="20" fill="#00d4ff" opacity="0.06"/>
<rect x="14" y="14" width="872" height="174" rx="21" fill="#7040ff" opacity="0.03"/>
<!-- Main card -->
<rect x="10" y="10" width="880" height="178" rx="22" fill="#020a12" stroke="url(#actBorder)" stroke-width="1.5"/>
<rect x="12" y="12" width="876" height="2" rx="1" fill="#ffffff" opacity="0.18"/>

<!-- Title -->
<text x="450" y="40" text-anchor="middle" font-family="'Trebuchet MS','Segoe UI',sans-serif" font-size="15" font-weight="900" fill="#00d4ff" filter="url(#glowA)" letter-spacing="2">CONTRIBUTION ACTIVITY GRAPH</text>

<!-- Grid background -->
<rect x="30" y="50" width="840" height="120" fill="url(#graphGrid)"/>

<!-- Month labels -->
<g font-family="'Segoe UI',monospace" font-size="10" fill="#4a6a7a">
  <text x="48" y="178">Jan</text><text x="106" y="178">Feb</text><text x="164" y="178">Mar</text>
  <text x="222" y="178">Apr</text><text x="280" y="178">May</text><text x="338" y="178">Jun</text>
  <text x="396" y="178">Jul</text><text x="454" y="178">Aug</text><text x="512" y="178">Sep</text>
  <text x="570" y="178">Oct</text><text x="628" y="178">Nov</text><text x="686" y="178">Dec</text>
  <text x="744" y="178">Jan</text><text x="802" y="178">Feb</text>
</g>

<!-- Activity graph fill area (area chart) -->
<path d="M 30,160
  L 48,155 L 60,150 L 72,148 L 84,145 L 96,143 L 108,140 L 120,138
  L 132,140 L 144,135 L 156,130 L 168,125 L 180,120 L 192,128 L 204,122
  L 216,115 L 228,110 L 240,105 L 252,108 L 264,112 L 276,105 L 288,98
  L 300,100 L 312,94 L 324,90 L 336,88 L 348,85 L 360,80 L 372,78
  L 384,75 L 396,72 L 408,70 L 420,68 L 432,72 L 444,65 L 456,60
  L 468,58 L 480,62 L 492,55 L 504,52 L 516,50 L 528,55 L 540,52
  L 552,48 L 564,55 L 576,60 L 588,52 L 600,55 L 612,60 L 624,55
  L 636,52 L 648,58 L 660,62 L 672,55 L 684,60 L 696,65 L 708,58
  L 720,52 L 732,48 L 744,55 L 756,60 L 768,52 L 780,48 L 792,55
  L 804,60 L 816,55 L 828,58 L 840,52 L 858,50
  L 858,168 L 30,168 Z"
  fill="url(#graphFill2)" opacity="0.7"/>
<path d="M 30,160
  L 48,152 L 60,148 L 72,145 L 84,143 L 96,140 L 108,138 L 120,135
  L 132,138 L 144,132 L 156,127 L 168,122 L 180,118 L 192,125 L 204,120
  L 216,112 L 228,108 L 240,102 L 252,106 L 264,110 L 276,102 L 288,95
  L 300,98 L 312,92 L 324,88 L 336,85 L 348,82 L 360,76 L 372,74
  L 384,72 L 396,68 L 408,66 L 420,64 L 432,68 L 444,62 L 456,57
  L 468,55 L 480,59 L 492,52 L 504,49 L 516,47 L 528,52 L 540,49
  L 552,45 L 564,52 L 576,57 L 588,49 L 600,52 L 612,57 L 624,52
  L 636,49 L 648,55 L 660,59 L 672,52 L 684,57 L 696,62 L 708,55
  L 720,49 L 732,45 L 744,52 L 756,57 L 768,49 L 780,45 L 792,52
  L 804,57 L 816,52 L 828,55 L 840,49 L 858,47
  L 858,168 L 30,168 Z"
  fill="url(#graphFill)" opacity="0.6"/>

<!-- Graph line (3D glowing) - shadow -->
<polyline points="30,162 48,155 60,150 72,148 84,145 96,143 108,140 120,138 132,140 144,135 156,130 168,125 180,120 192,128 204,122 216,115 228,110 240,105 252,108 264,112 276,105 288,98 300,100 312,94 324,90 336,88 348,85 360,80 372,78 384,75 396,72 408,70 420,68 432,72 444,65 456,60 468,58 480,62 492,55 504,52 516,50 528,55 540,52 552,48 564,55 576,60 588,52 600,55 612,60 624,55 636,52 648,58 660,62 672,55 684,60 696,65 708,58 720,52 732,48 744,55 756,60 768,52 780,48 792,55 804,60 816,55 828,58 840,52 858,50"
  fill="none" stroke="#7040ff" stroke-width="3" stroke-opacity="0.4"/>
<!-- Main line -->
<polyline points="30,162 48,155 60,150 72,148 84,145 96,143 108,140 120,138 132,140 144,135 156,130 168,125 180,120 192,128 204,122 216,115 228,110 240,105 252,108 264,112 276,105 288,98 300,100 312,94 324,90 336,88 348,85 360,80 372,78 384,75 396,72 408,70 420,68 432,72 444,65 456,60 468,58 480,62 492,55 504,52 516,50 528,55 540,52 552,48 564,55 576,60 588,52 600,55 612,60 624,55 636,52 648,58 660,62 672,55 684,60 696,65 708,58 720,52 732,48 744,55 756,60 768,52 780,48 792,55 804,60 816,55 828,58 840,52 858,50"
  fill="none" stroke="#00d4ff" stroke-width="2" filter="url(#lineGlowA)"/>

<!-- Animated dot moving along the graph line -->
<circle cx="30" cy="162" r="4" fill="#00d4ff" filter="url(#glowA)">
  <animateMotion path="M 30,162 L 48,155 L 60,150 L 72,148 L 84,145 L 96,143 L 108,140 L 120,138 L 132,140 L 144,135 L 156,130 L 168,125 L 180,120 L 192,128 L 204,122 L 216,115 L 228,110 L 240,105 L 252,108 L 264,112 L 276,105 L 288,98 L 300,100 L 312,94 L 324,90 L 336,88 L 348,85 L 360,80 L 372,78 L 384,75 L 396,72 L 408,70 L 420,68 L 432,72 L 444,65 L 456,60 L 468,58 L 480,62 L 492,55 L 504,52 L 516,50 L 528,55 L 540,52 L 552,48 L 564,55 L 576,60 L 588,52 L 600,55 L 612,60 L 624,55 L 636,52 L 648,58 L 660,62 L 672,55 L 684,60 L 696,65 L 708,58 L 720,52 L 732,48 L 744,55 L 756,60 L 768,52 L 780,48 L 792,55 L 804,60 L 816,55 L 828,58 L 840,52 L 858,50"
    dur="10s" repeatCount="indefinite" begin="0s" additive="replace"/>
</circle>

<!-- Peak annotation -->
<line x1="516" y1="50" x2="516" y2="168" stroke="#00ff88" stroke-width="1" stroke-dasharray="3 3" opacity="0.4"/>
<text x="516" y="46" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="9" fill="#00ff88" opacity="0.8">peak</text>
</svg>
