  stroke-linejoin="round" filter="url(#fLineGlow)"/>


<text x="40" y="52"      text-anchor="end" font-family="'Segoe UI',monospace,sans-serif" font-size="9" fill="#6b7280">1</text>
<text x="40" y="170" text-anchor="end" font-family="'Segoe UI',monospace,sans-serif" font-size="9" fill="#6b7280">0</text>
</svg>