<path d="M 40.0,152.4 L 56.1,165.4 L 72.2,163.3 L 88.2,138.7 L 104.3,169.5 L 120.4,164.7 L 136.5,161.3 L 152.5,170.2 L 168.6,159.2 L 184.7,159.9 L 200.8,140.7 L 216.9,168.1 L 232.9,159.2 L 249.0,175.0 L 265.1,175.0 L 281.2,175.0 L 297.3,175.0 L 313.3,175.0 L 329.4,168.8 L 345.5,168.8 L 361.6,168.8 L 377.6,175.0 L 393.7,175.0 L 409.8,175.0 L 425.9,175.0 L 442.0,175.0 L 458.0,166.1 L 474.1,175.0 L 490.2,175.0 L 506.3,175.0 L 522.4,175.0 L 538.4,175.0 L 554.5,175.0 L 570.6,175.0 L 586.7,175.0 L 602.7,175.0 L 618.8,175.0 L 634.9,175.0 L 651.0,175.0 L 667.1,175.0 L 683.1,175.0 L 699.2,175.0 L 715.3,169.5 L 731.4,171.6 L 747.5,55.0 L 763.5,162.7 L 779.6,175.0 L 795.7,172.3 L 811.8,168.1 L 827.8,174.3 L 843.9,172.3 L 860.0,146.2 L 860,175 L 40,175 Z" fill="url(#areaFill2)" opacity="0.5"/>

