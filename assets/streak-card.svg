<svg width="900" height="220" viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="bgStr" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#06020e"/>
    <stop offset="100%" stop-color="#0c0025"/>
  </linearGradient>
  <linearGradient id="streakBorder" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#ff6600"/>
    <stop offset="40%" stop-color="#ff1cf7"/>
    <stop offset="80%" stop-color="#ffcc00"/>
    <stop offset="100%" stop-color="#ff6600"/>
    <animateTransform attributeName="gradientTransform" type="rotate" values="0 0.5 0.5;360 0.5 0.5" dur="5s" repeatCount="indefinite"/>
  </linearGradient>
  <linearGradient id="fireG" x1="0%" y1="100%" x2="0%" y2="0%">
    <stop offset="0%" stop-color="#ff3300"/>
    <stop offset="40%" stop-color="#ff8800"/>
    <stop offset="80%" stop-color="#ffcc00"/>
    <stop offset="100%" stop-color="#fff080"/>
  </linearGradient>
  <linearGradient id="strNumG" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#ffcc00"/>
    <stop offset="100%" stop-color="#ff6600"/>
  </linearGradient>
  <linearGradient id="calG" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#ff6600" stop-opacity="0.8"/>
    <stop offset="100%" stop-color="#ff6600" stop-opacity="0.1"/>
  </linearGradient>
  <filter id="fogStr" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="35"/>
  </filter>
  <filter id="fireGlow" x="-100%" y="-100%" width="300%" height="300%">
    <feGaussianBlur stdDeviation="10" result="b"/>
    <feFlood flood-color="#ff6600" result="c"/>
    <feComposite in="c" in2="b" operator="in" result="g"/>
    <feMerge><feMergeNode in="g"/><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="bigFireGlow" x="-100%" y="-100%" width="300%" height="300%">
    <feGaussianBlur stdDeviation="18" result="b"/>
    <feFlood flood-color="#ff8800" result="c"/>
    <feComposite in="c" in2="b" operator="in" result="g"/>
    <feMerge><feMergeNode in="g"/><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="smGlowStr" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="4"/>
  </filter>
  <filter id="depth3dStr" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="3" dy="6" stdDeviation="5" flood-color="#ff6600" flood-opacity="0.6"/>
    <feDropShadow dx="-2" dy="-3" stdDeviation="3" flood-color="#ffcc00" flood-opacity="0.3"/>
  </filter>
</defs>

<rect width="900" height="220" fill="url(#bgStr)"/>

<!-- Ambient blobs -->
<ellipse cx="150" cy="180" rx="160" ry="100" fill="#ff6600" opacity="0.15" filter="url(#fogStr)">
  <animate attributeName="cx" values="150;220;150" dur="8s" repeatCount="indefinite"/>
</ellipse>
<ellipse cx="760" cy="50" rx="150" ry="90" fill="#ffcc00" opacity="0.10" filter="url(#fogStr)">
  <animate attributeName="cy" values="50;80;50" dur="7s" repeatCount="indefinite"/>
</ellipse>

<!-- Card 3D shadows -->
<rect x="18" y="18" width="864" height="190" rx="20" fill="#ff6600" opacity="0.10"/>
<rect x="14" y="14" width="872" height="194" rx="21" fill="#ffcc00" opacity="0.04"/>
<!-- Main card -->
<rect x="10" y="10" width="880" height="198" rx="22" fill="#07030e" stroke="url(#streakBorder)" stroke-width="2"/>
<rect x="12" y="12" width="876" height="2" rx="1" fill="#ffffff" opacity="0.2"/>
<rect x="12" y="12" width="2" height="194" rx="1" fill="#ffffff" opacity="0.08"/>

<!-- ======= Left Section: Current Streak ======= -->

<!-- Fire emoji — 3D animated -->
<g transform="translate(175,108)">
  <!-- Outer glow pulse -->
  <circle cx="0" cy="-10" r="50" fill="#ff6600" opacity="0.08" filter="url(#fogStr)">
    <animate attributeName="r" values="40;60;40" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.08;0.18;0.08" dur="2s" repeatCount="indefinite"/>
  </circle>
  <!-- Fire shape (3D layers) -->
  <text x="4" y="10" text-anchor="middle" font-size="50" fill="#ff3300" opacity="0.4">🔥</text>
  <text x="2" y="8" text-anchor="middle" font-size="50" fill="#ff6600" opacity="0.6">🔥</text>
  <text x="0" y="6" text-anchor="middle" font-size="50" filter="url(#bigFireGlow)">🔥
    <animateTransform attributeName="transform" type="translate" values="0,0;2,-4;-1,-2;0,0" dur="0.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.8;1" dur="0.8s" repeatCount="indefinite"/>
  </text>
</g>

<!-- Streak number (3D shadow) -->
<text x="181" y="82" text-anchor="middle" font-family="'Trebuchet MS',sans-serif" font-size="48" font-weight="900" fill="#ff6600" opacity="0.3" filter="url(#bigFireGlow)">7</text>
<text x="178" y="80" text-anchor="middle" font-family="'Trebuchet MS',sans-serif" font-size="48" font-weight="900" fill="url(#strNumG)" filter="url(#depth3dStr)">
  7
  <animate attributeName="opacity" values="1;0.7;1" dur="2s" repeatCount="indefinite"/>
</text>
<text x="178" y="102" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="13" fill="#ff9940" letter-spacing="2">CURRENT STREAK</text>
<text x="178" y="120" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="11" fill="#8a5030">Jul 12 – Jul 18, 2026</text>

<!-- ======= Center divider ======= -->
<line x1="320" y1="25" x2="320" y2="195" stroke="#ff6600" stroke-width="1" stroke-dasharray="4 4" opacity="0.3"/>

<!-- ======= Center Section: Total Contributions ======= -->
<text x="510" y="85" text-anchor="middle" font-family="'Trebuchet MS',sans-serif" font-size="40" font-weight="900" fill="url(#strNumG)" filter="url(#depth3dStr)">
  500+
  <animate attributeName="opacity" values="1;0.75;1" dur="3s" repeatCount="indefinite"/>
</text>
<text x="510" y="108" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="13" fill="#ff9940" letter-spacing="2">TOTAL CONTRIBUTIONS</text>
<text x="510" y="126" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="11" fill="#8a5030">Dec 2023 – Present</text>

<!-- Contribution mini-calendar visualization -->
<g transform="translate(350,145)">
  <!-- weeks grid (7 cols x 3 rows shown, green/orange heatmap) -->
  <!-- Row 1 -->
  <rect x="0"  y="0" width="14" height="14" rx="3" fill="#ff660055"/>
  <rect x="18" y="0" width="14" height="14" rx="3" fill="#ff6600bb"/>
  <rect x="36" y="0" width="14" height="14" rx="3" fill="#ff8800dd"/>
  <rect x="54" y="0" width="14" height="14" rx="3" fill="#ff6600aa"/>
  <rect x="72" y="0" width="14" height="14" rx="3" fill="#ff880066"/>
  <rect x="90" y="0" width="14" height="14" rx="3" fill="#ff6600cc"/>
  <rect x="108" y="0" width="14" height="14" rx="3" fill="#ffcc0044"/>
  <rect x="126" y="0" width="14" height="14" rx="3" fill="#ff880088"/>
  <rect x="144" y="0" width="14" height="14" rx="3" fill="#ff6600ff" filter="url(#smGlowStr)"/>
  <rect x="162" y="0" width="14" height="14" rx="3" fill="#ffcc00bb" filter="url(#smGlowStr)"/>
  <rect x="180" y="0" width="14" height="14" rx="3" fill="#ff880066"/>
  <rect x="198" y="0" width="14" height="14" rx="3" fill="#ff660033"/>
  <rect x="216" y="0" width="14" height="14" rx="3" fill="#ff6600aa"/>
  <!-- Row 2 -->
  <rect x="0"  y="18" width="14" height="14" rx="3" fill="#ff880099"/>
  <rect x="18" y="18" width="14" height="14" rx="3" fill="#ff660055"/>
  <rect x="36" y="18" width="14" height="14" rx="3" fill="#ffcc00cc" filter="url(#smGlowStr)"/>
  <rect x="54" y="18" width="14" height="14" rx="3" fill="#ff880044"/>
  <rect x="72" y="18" width="14" height="14" rx="3" fill="#ff6600bb"/>
  <rect x="90" y="18" width="14" height="14" rx="3" fill="#ffcc0088"/>
  <rect x="108" y="18" width="14" height="14" rx="3" fill="#ff8800aa"/>
  <rect x="126" y="18" width="14" height="14" rx="3" fill="#ff660066"/>
  <rect x="144" y="18" width="14" height="14" rx="3" fill="#ff6600dd"/>
  <rect x="162" y="18" width="14" height="14" rx="3" fill="#ff880033"/>
  <rect x="180" y="18" width="14" height="14" rx="3" fill="#ffcc00ff" filter="url(#smGlowStr)"/>
  <rect x="198" y="18" width="14" height="14" rx="3" fill="#ff6600bb"/>
  <rect x="216" y="18" width="14" height="14" rx="3" fill="#ff880077"/>
  <!-- Row 3 (recent, more active) -->
  <rect x="0"  y="36" width="14" height="14" rx="3" fill="#ff660099"/>
  <rect x="18" y="36" width="14" height="14" rx="3" fill="#ffcc00dd" filter="url(#smGlowStr)"/>
  <rect x="36" y="36" width="14" height="14" rx="3" fill="#ff6600ff" filter="url(#fireGlow)"/>
  <rect x="54" y="36" width="14" height="14" rx="3" fill="#ffcc00bb" filter="url(#smGlowStr)"/>
  <rect x="72" y="36" width="14" height="14" rx="3" fill="#ff8800ee" filter="url(#smGlowStr)"/>
  <rect x="90" y="36" width="14" height="14" rx="3" fill="#ff6600cc"/>
  <rect x="108" y="36" width="14" height="14" rx="3" fill="#ffcc0099"/>
  <rect x="126" y="36" width="14" height="14" rx="3" fill="#ff880088"/>
  <rect x="144" y="36" width="14" height="14" rx="3" fill="#ff6600ff" filter="url(#fireGlow)"/>
  <rect x="162" y="36" width="14" height="14" rx="3" fill="#ffcc00ff" filter="url(#fireGlow)"/>
  <rect x="180" y="36" width="14" height="14" rx="3" fill="#ff8800ff" filter="url(#smGlowStr)"/>
  <rect x="198" y="36" width="14" height="14" rx="3" fill="#ffcc00ee" filter="url(#fireGlow)"/>
  <!-- Today's cell pulsing -->
  <rect x="216" y="36" width="14" height="14" rx="3" fill="#ffcc00" filter="url(#bigFireGlow)">
    <animate attributeName="opacity" values="1;0.5;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</g>

<!-- ======= Right Section: Longest Streak ======= -->
<line x1="710" y1="25" x2="710" y2="195" stroke="#ff6600" stroke-width="1" stroke-dasharray="4 4" opacity="0.3"/>

<text x="810" y="85" text-anchor="middle" font-family="'Trebuchet MS',sans-serif" font-size="40" font-weight="900" fill="url(#strNumG)" filter="url(#depth3dStr)">
  12
  <animate attributeName="opacity" values="1;0.75;1" dur="3.5s" repeatCount="indefinite"/>
</text>
<text x="810" y="108" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="13" fill="#ff9940" letter-spacing="2">LONGEST STREAK</text>
<text x="810" y="126" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="11" fill="#8a5030">Personal Best 🏆</text>

<!-- Floating particles (fire sparks) -->
<circle cx="120" cy="40" r="2" fill="#ffcc00" filter="url(#fireGlow)" opacity="0.9">
  <animateTransform attributeName="transform" type="translate" values="0,0;8,-20;-4,-35;0,0" dur="2.5s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0.9;0.4;0;0.9" dur="2.5s" repeatCount="indefinite"/>
</circle>
<circle cx="200" cy="60" r="1.5" fill="#ff8800" filter="url(#fireGlow)" opacity="0.8">
  <animateTransform attributeName="transform" type="translate" values="0,0;-6,-18;2,-28;0,0" dur="3.1s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0.8;0.3;0;0.8" dur="3.1s" repeatCount="indefinite"/>
</circle>
<circle cx="170" cy="30" r="1.8" fill="#ffcc00" filter="url(#fireGlow)">
  <animateTransform attributeName="transform" type="translate" values="0,0;4,-22;-2,-38;0,0" dur="1.9s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="1;0.4;0;1" dur="1.9s" repeatCount="indefinite"/>
</circle>
</svg>
