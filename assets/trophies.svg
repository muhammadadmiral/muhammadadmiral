  <text x="0" y="24" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="9.5" fill="#e2e8f0" font-weight="700" letter-spacing="0.5">PULL REQUESTS</text>
  <text x="0" y="44" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="15" fill="#ffffff" font-weight="900" filter="url(#numDepth)">43</text>
  <animate attributeName="opacity" values="1;0.75;1" dur="3.5999999999999996s" repeatCount="indefinite" begin="0.8s"/>
</g>
