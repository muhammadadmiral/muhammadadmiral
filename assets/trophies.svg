<svg width="900" height="140" viewBox="0 0 900 140" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="bgTr" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#060402"/>
    <stop offset="100%" stop-color="#120800"/>
  </linearGradient>
  <linearGradient id="goldG" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#ffdd00"/>
    <stop offset="50%" stop-color="#ffa000"/>
    <stop offset="100%" stop-color="#ff6600"/>
  </linearGradient>
  <linearGradient id="silverG" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#e0e8f0"/>
    <stop offset="100%" stop-color="#9090b0"/>
  </linearGradient>
  <filter id="fogTr" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="30"/>
  </filter>
  <filter id="glowGold" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur stdDeviation="8" result="b"/>
    <feFlood flood-color="#ffaa00" result="c"/>
    <feComposite in="c" in2="b" operator="in" result="g"/>
    <feMerge><feMergeNode in="g"/><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glowSilver" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur stdDeviation="5" result="b"/>
    <feFlood flood-color="#a0b0c0" result="c"/>
    <feComposite in="c" in2="b" operator="in" result="g"/>
    <feMerge><feMergeNode in="g"/><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="depth3dTr" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="2" dy="5" stdDeviation="4" flood-color="#ffaa00" flood-opacity="0.5"/>
  </filter>
</defs>

<rect width="900" height="140" fill="url(#bgTr)"/>
<ellipse cx="450" cy="80" rx="400" ry="80" fill="#ffaa00" opacity="0.06" filter="url(#fogTr)">
  <animate attributeName="opacity" values="0.06;0.12;0.06" dur="4s" repeatCount="indefinite"/>
</ellipse>

<!-- Trophy badges — 6 trophies -->
<!-- 1. Commits -->
<g transform="translate(65,70)">
  <text x="0" y="0" text-anchor="middle" font-size="36" filter="url(#glowGold)">🏆</text>
  <text x="0" y="22" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="9.5" fill="#ffcc00" font-weight="700">COMMITS</text>
  <text x="0" y="36" text-anchor="middle" font-family="'Trebuchet MS',sans-serif" font-size="13" fill="url(#goldG)" font-weight="900" filter="url(#depth3dTr)">100+</text>
  <animate attributeName="opacity" values="1;0.7;1" dur="3.1s" repeatCount="indefinite" begin="0s"/>
</g>

<!-- 2. Repositories -->
<g transform="translate(195,70)">
  <text x="0" y="0" text-anchor="middle" font-size="36" filter="url(#glowGold)">🥇</text>
  <text x="0" y="22" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="9.5" fill="#ffcc00" font-weight="700">REPOSITORIES</text>
  <text x="0" y="36" text-anchor="middle" font-family="'Trebuchet MS',sans-serif" font-size="13" fill="url(#goldG)" font-weight="900" filter="url(#depth3dTr)">21</text>
  <animate attributeName="opacity" values="1;0.7;1" dur="2.8s" repeatCount="indefinite" begin="0.3s"/>
</g>

<!-- 3. Followers -->
<g transform="translate(325,70)">
  <text x="0" y="0" text-anchor="middle" font-size="36" filter="url(#glowSilver)">🥈</text>
  <text x="0" y="22" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="9.5" fill="#c0c8d8" font-weight="700">FOLLOWERS</text>
  <text x="0" y="36" text-anchor="middle" font-family="'Trebuchet MS',sans-serif" font-size="13" fill="url(#silverG)" font-weight="900">14</text>
  <animate attributeName="opacity" values="1;0.65;1" dur="3.4s" repeatCount="indefinite" begin="0.6s"/>
</g>

<!-- 4. Stars -->
<g transform="translate(455,70)">
  <text x="0" y="0" text-anchor="middle" font-size="36">⭐</text>
  <text x="0" y="22" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="9.5" fill="#aaa090" font-weight="700">STARS EARNED</text>
  <text x="0" y="36" text-anchor="middle" font-family="'Trebuchet MS',sans-serif" font-size="13" fill="#c8b880" font-weight="900">0</text>
  <animate attributeName="opacity" values="1;0.65;1" dur="4.0s" repeatCount="indefinite" begin="0.9s"/>
</g>

<!-- 5. Pull Requests -->
<g transform="translate(585,70)">
  <text x="0" y="0" text-anchor="middle" font-size="36" filter="url(#glowSilver)">🏅</text>
  <text x="0" y="22" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="9.5" fill="#c0c8d8" font-weight="700">PULL REQUESTS</text>
  <text x="0" y="36" text-anchor="middle" font-family="'Trebuchet MS',sans-serif" font-size="13" fill="url(#silverG)" font-weight="900">10+</text>
  <animate attributeName="opacity" values="1;0.65;1" dur="3.7s" repeatCount="indefinite" begin="1.2s"/>
</g>

<!-- 6. Joined Year -->
<g transform="translate(720,70)">
  <text x="0" y="0" text-anchor="middle" font-size="36" filter="url(#glowGold)">🎯</text>
  <text x="0" y="22" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="9.5" fill="#ffcc00" font-weight="700">JOINED IN</text>
  <text x="0" y="36" text-anchor="middle" font-family="'Trebuchet MS',sans-serif" font-size="13" fill="url(#goldG)" font-weight="900" filter="url(#depth3dTr)">2023</text>
  <animate attributeName="opacity" values="1;0.7;1" dur="2.5s" repeatCount="indefinite" begin="1.5s"/>
</g>

<!-- 7. Experience -->
<g transform="translate(840,70)">
  <text x="0" y="0" text-anchor="middle" font-size="36" filter="url(#glowGold)">⚡</text>
  <text x="0" y="22" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="9.5" fill="#ffcc00" font-weight="700">EXPERIENCE</text>
  <text x="0" y="36" text-anchor="middle" font-family="'Trebuchet MS',sans-serif" font-size="13" fill="url(#goldG)" font-weight="900" filter="url(#depth3dTr)">2y+</text>
  <animate attributeName="opacity" values="1;0.7;1" dur="3.2s" repeatCount="indefinite" begin="1.8s"/>
</g>
</svg>
