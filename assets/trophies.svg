  <text x="0" y="44" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="15" fill="#ffffff" font-weight="900" filter="url(#numDepth)">14</text>
  <animate attributeName="opacity" values="1;0.75;1" dur="3s" repeatCount="indefinite" begin="0.4s"/>
</g>
