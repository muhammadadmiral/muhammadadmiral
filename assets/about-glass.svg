<svg width="900" height="360" viewBox="0 0 900 360" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#03001a"/>
    <stop offset="100%" stop-color="#0a0028"/>
  </linearGradient>
  <linearGradient id="cardBorder" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%"   stop-color="#c084fc" stop-opacity="0.7"/>
    <stop offset="50%"  stop-color="#67e8f9" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#f472b6" stop-opacity="0.7"/>
  </linearGradient>
  <linearGradient id="titleG" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%"   stop-color="#c084fc"/>
    <stop offset="100%" stop-color="#67e8f9"/>
  </linearGradient>
  <linearGradient id="chipPink" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%"   stop-color="#db2777" stop-opacity="0.25"/>
    <stop offset="100%" stop-color="#9333ea" stop-opacity="0.25"/>
  </linearGradient>
  <linearGradient id="chipCyan" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%"   stop-color="#0891b2" stop-opacity="0.25"/>
    <stop offset="100%" stop-color="#059669" stop-opacity="0.25"/>
  </linearGradient>
  <linearGradient id="chipPurple" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%"   stop-color="#7c3aed" stop-opacity="0.25"/>
    <stop offset="100%" stop-color="#db2777" stop-opacity="0.25"/>
  </linearGradient>
  <linearGradient id="chipGreen" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%"   stop-color="#059669" stop-opacity="0.25"/>
    <stop offset="100%" stop-color="#65a30d" stop-opacity="0.25"/>
  </linearGradient>
  <linearGradient id="shimmerG" x1="-100%" y1="0%" x2="200%" y2="0%">
    <stop offset="0%"   stop-color="#ffffff" stop-opacity="0"/>
    <stop offset="50%"  stop-color="#ffffff" stop-opacity="0.07"/>
    <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    <animate attributeName="x1" values="-100%;200%;-100%" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="0%;400%;0%"       dur="5s" repeatCount="indefinite"/>
  </linearGradient>
  <filter id="fog" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur stdDeviation="48"/>
  </filter>
  <filter id="cardDepth" x="-8%" y="-8%" width="116%" height="120%">
    <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#7c3aed" flood-opacity="0.22"/>
  </filter>
  <!-- Crisp glow — SMALL stdDeviation for text labels so text stays sharp -->
  <filter id="titleGlow" x="-20%" y="-50%" width="140%" height="200%">
    <feGaussianBlur stdDeviation="6" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="accentGlow" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="3" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="numDepth" x="-15%" y="-20%" width="130%" height="140%">
    <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#c084fc" flood-opacity="0.5"/>
  </filter>
</defs>

<rect width="900" height="360" fill="url(#bg)"/>

<!-- Ambient orbs — isolated, won't affect text -->
<ellipse cx="120" cy="290" rx="200" ry="130" fill="#7c3aed" opacity="0.18" filter="url(#fog)">
  <animate attributeName="cx" values="120;180;120" dur="9s" repeatCount="indefinite"/>
</ellipse>
<ellipse cx="800" cy="80"  rx="180" ry="120" fill="#0891b2" opacity="0.14" filter="url(#fog)">
  <animate attributeName="cy" values="80;110;80" dur="7s" repeatCount="indefinite"/>
</ellipse>

<!-- Card shadow + body -->
<rect x="56" y="44" width="788" height="282" rx="26" fill="#7c3aed" opacity="0.12" filter="url(#cardDepth)"/>
<rect x="52" y="40" width="796" height="290" rx="28" fill="#06021a" stroke="url(#cardBorder)" stroke-width="1.5"/>
<!-- Top glass highlight -->
<rect x="54" y="42" width="792" height="3" rx="1.5" fill="#ffffff" opacity="0.14"/>
<!-- Shimmer -->
<rect x="52" y="40" width="796" height="290" rx="28" fill="url(#shimmerG)"/>

<!-- Title — crisp, no blur on text itself -->
<text x="450" y="86"
      text-anchor="middle"
      font-family="'Segoe UI','Trebuchet MS',sans-serif"
      font-size="20" font-weight="800" letter-spacing="3"
      fill="url(#titleG)" filter="url(#titleGlow)">✦ ABOUT ME</text>

<!-- Divider -->
<rect x="350" y="96" width="200" height="1.5" rx="0.75" fill="url(#titleG)" opacity="0.5"/>

<!-- Bio text — plain fill, no blur filter applied to these -->
<text x="450" y="132"
      text-anchor="middle"
      font-family="'Segoe UI',sans-serif" font-size="15.5"
      fill="#ddd6fe">Fullstack Developer focused on Frontend Architecture,</text>
<text x="450" y="155"
      text-anchor="middle"
      font-family="'Segoe UI',sans-serif" font-size="15.5"
      fill="#ddd6fe">Interactive UI/UX, and Dashboard Development.</text>

<text x="450" y="184"
      text-anchor="middle"
      font-family="'Segoe UI',sans-serif" font-size="13.5"
      fill="#a78bfa" opacity="0.9">Passionate about motion design · Coding with coffee · Debugging at 2AM</text>

<text x="450" y="207"
      text-anchor="middle"
      font-family="'Segoe UI',sans-serif" font-size="13"
      fill="#7c6fc0" opacity="0.8">Always learning something new — currently diving into C and System Design.</text>

<!-- === STAT CHIPS — real data from GitHub API === -->
<!-- Chips row -->
<g transform="translate(0,232)">

  <!-- Repos chip -->
  <rect x="72" y="0" width="160" height="52" rx="16"
        fill="url(#chipPink)" stroke="#f472b6" stroke-width="1" stroke-opacity="0.6"/>
  <text x="152" y="20" text-anchor="middle"
        font-family="'Segoe UI',sans-serif" font-size="10" letter-spacing="1.5"
        fill="#f9a8d4" font-weight="700">PUBLIC REPOS</text>
  <text x="152" y="42" text-anchor="middle"
        font-family="'Segoe UI','Trebuchet MS',sans-serif" font-size="24" font-weight="900"
        fill="#ffffff" filter="url(#numDepth)">21</text>

  <!-- Followers chip -->
  <rect x="248" y="0" width="160" height="52" rx="16"
        fill="url(#chipCyan)" stroke="#67e8f9" stroke-width="1" stroke-opacity="0.6"/>
  <text x="328" y="20" text-anchor="middle"
        font-family="'Segoe UI',sans-serif" font-size="10" letter-spacing="1.5"
        fill="#a5f3fc" font-weight="700">FOLLOWERS</text>
  <text x="328" y="42" text-anchor="middle"
        font-family="'Segoe UI','Trebuchet MS',sans-serif" font-size="24" font-weight="900"
        fill="#ffffff" filter="url(#numDepth)">14</text>

  <!-- Following chip -->
  <rect x="424" y="0" width="160" height="52" rx="16"
        fill="url(#chipPurple)" stroke="#c084fc" stroke-width="1" stroke-opacity="0.6"/>
  <text x="504" y="20" text-anchor="middle"
        font-family="'Segoe UI',sans-serif" font-size="10" letter-spacing="1.5"
        fill="#d8b4fe" font-weight="700">FOLLOWING</text>
  <text x="504" y="42" text-anchor="middle"
        font-family="'Segoe UI','Trebuchet MS',sans-serif" font-size="24" font-weight="900"
        fill="#ffffff" filter="url(#numDepth)">11</text>

  <!-- Since chip -->
  <rect x="600" y="0" width="228" height="52" rx="16"
        fill="url(#chipGreen)" stroke="#4ade80" stroke-width="1" stroke-opacity="0.5"/>
  <text x="714" y="20" text-anchor="middle"
        font-family="'Segoe UI',sans-serif" font-size="10" letter-spacing="1.5"
        fill="#86efac" font-weight="700">MEMBER SINCE</text>
  <text x="714" y="42" text-anchor="middle"
        font-family="'Segoe UI','Trebuchet MS',sans-serif" font-size="20" font-weight="900"
        fill="#ffffff" filter="url(#numDepth)">Dec 11, 2023</text>

</g>

<!-- Floating particles -->
<circle cx="84"  cy="58"  r="2.2" fill="#c084fc" filter="url(#accentGlow)" opacity="0.8">
  <animateTransform attributeName="transform" type="translate" values="0,0;6,-14;0,0" dur="4.5s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0.8;0.2;0.8" dur="4.5s" repeatCount="indefinite"/>
</circle>
<circle cx="830" cy="300" r="2"   fill="#67e8f9" filter="url(#accentGlow)" opacity="0.7">
  <animateTransform attributeName="transform" type="translate" values="0,0;-8,-16;0,0" dur="5.8s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0.7;0.1;0.7" dur="5.8s" repeatCount="indefinite"/>
</circle>
</svg>
