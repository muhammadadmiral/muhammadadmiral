<svg width="900" height="380" viewBox="0 0 900 380" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#040412"/>
    <stop offset="100%" stop-color="#0e0028"/>
  </linearGradient>
  <linearGradient id="cardG2" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#ffffff" stop-opacity="0.07"/>
    <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02"/>
  </linearGradient>
  <linearGradient id="borderG2" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#ff1cf7"/>
    <stop offset="50%" stop-color="#00d4ff"/>
    <stop offset="100%" stop-color="#00ff88"/>
  </linearGradient>
  <linearGradient id="titleG" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#ff1cf7"/>
    <stop offset="100%" stop-color="#00d4ff"/>
  </linearGradient>
  <filter id="glow2" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur stdDeviation="8" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glow2sm" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur stdDeviation="5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="fog2" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="40"/>
  </filter>
  <filter id="depth2" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="3" dy="6" stdDeviation="5" flood-color="#ff1cf7" flood-opacity="0.4"/>
    <feDropShadow dx="-2" dy="-3" stdDeviation="3" flood-color="#00d4ff" flood-opacity="0.25"/>
  </filter>
  <!-- Scanline pattern -->
  <pattern id="scan" width="2" height="3" patternUnits="userSpaceOnUse">
    <rect width="2" height="1" fill="#ffffff" opacity="0.018"/>
  </pattern>
</defs>

<rect width="900" height="380" fill="url(#bg2)"/>

<!-- Ambient blobs -->
<ellipse cx="120" cy="300" rx="200" ry="140" fill="#ff1cf7" opacity="0.16" filter="url(#fog2)">
  <animate attributeName="cx" values="120;180;120" dur="9s" repeatCount="indefinite"/>
</ellipse>
<ellipse cx="800" cy="80" rx="200" ry="130" fill="#00d4ff" opacity="0.14" filter="url(#fog2)">
  <animate attributeName="cy" values="80;120;80" dur="7s" repeatCount="indefinite"/>
</ellipse>

<!-- Card shadow layers (3D depth) -->
<rect x="84" y="58" width="732" height="274" rx="22" fill="#ff1cf7" opacity="0.07"/>
<rect x="80" y="55" width="740" height="280" rx="23" fill="#00d4ff" opacity="0.04"/>
<!-- Main glass card -->
<rect x="76" y="52" width="748" height="288" rx="24" fill="url(#cardG2)" stroke="url(#borderG2)" stroke-width="1.3"/>
<rect x="78" y="54" width="744" height="2" rx="1" fill="#ffffff" opacity="0.22"/>
<rect x="78" y="54" width="2" height="284" rx="1" fill="#ffffff" opacity="0.10"/>

<!-- Scanline overlay -->
<rect x="76" y="52" width="748" height="288" rx="24" fill="url(#scan)"/>

<!-- Title -->
<text x="450" y="102" text-anchor="middle" font-family="'Trebuchet MS','Segoe UI',sans-serif" font-size="22" font-weight="900" fill="url(#titleG)" filter="url(#glow2)" letter-spacing="1">
  ✨ ABOUT ME
  <animate attributeName="opacity" values="1;0.7;1" dur="4s" repeatCount="indefinite"/>
</text>

<!-- 3D decorative line under title -->
<rect x="350" y="112" width="0" height="2" rx="1" fill="url(#borderG2)" opacity="0.8">
  <animate attributeName="width" values="0;200;0" dur="4s" repeatCount="indefinite"/>
  <animate attributeName="x" values="450;350;450" dur="4s" repeatCount="indefinite"/>
</rect>

<!-- Avatar ring (animated) -->
<circle cx="450" cy="208" r="55" fill="none" stroke="url(#borderG2)" stroke-width="2" opacity="0.3" filter="url(#glow2sm)">
  <animateTransform attributeName="transform" type="rotate" values="0 450 208;360 450 208" dur="12s" repeatCount="indefinite"/>
</circle>
<circle cx="450" cy="208" r="46" fill="none" stroke="#ff1cf7" stroke-width="1" stroke-dasharray="8 4" opacity="0.4">
  <animateTransform attributeName="transform" type="rotate" values="360 450 208;0 450 208" dur="8s" repeatCount="indefinite"/>
</circle>

<!-- Bio text with 3D depth shadow -->
<!-- Shadow -->
<text x="452" y="152" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="15.5" fill="#ff1cf7" opacity="0.15">Fullstack Developer fokus Frontend • Dashboard • Interactive UI/UX</text>
<!-- Main -->
<text x="450" y="150" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="15.5" fill="#e0d8f8">Fullstack Developer fokus Frontend • Dashboard • Interactive UI/UX</text>

<text x="452" y="178" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="14" fill="#b8b0e0" opacity="0.8">Motion design enjoyer. Ngoding sambil ngopi.</text>
<text x="450" y="176" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="14" fill="#b8b0e0">Motion design enjoyer. Ngoding sambil ngopi.</text>

<text x="452" y="206" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="14" fill="#9488c8" opacity="0.6">Ngulik animasi sampai jam 2 pagi.</text>
<text x="450" y="204" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="14" fill="#9488c8">Ngulik animasi sampai jam 2 pagi.</text>

<text x="452" y="234" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="14" fill="#7a6eaa" opacity="0.5">Masih terus belajar hal baru tiap hari.</text>
<text x="450" y="232" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="14" fill="#7a6eaa">Masih terus belajar hal baru tiap hari.</text>

<!-- Stat chips -->
<g filter="url(#glow2sm)">
  <!-- Repos -->
  <rect x="110" y="275" width="140" height="40" rx="20" fill="#ff1cf7" opacity="0.12" stroke="#ff1cf7" stroke-width="1" stroke-opacity="0.5"/>
  <text x="180" y="291" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="11" fill="#ff9ef9" font-weight="700">PUBLIC REPOS</text>
  <text x="180" y="307" text-anchor="middle" font-family="'Trebuchet MS',sans-serif" font-size="16" fill="#ffffff" font-weight="900" filter="url(#depth2)">21</text>
  <!-- Followers -->
  <rect x="270" y="275" width="140" height="40" rx="20" fill="#00d4ff" opacity="0.10" stroke="#00d4ff" stroke-width="1" stroke-opacity="0.5"/>
  <text x="340" y="291" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="11" fill="#9ef4ff" font-weight="700">FOLLOWERS</text>
  <text x="340" y="307" text-anchor="middle" font-family="'Trebuchet MS',sans-serif" font-size="16" fill="#ffffff" font-weight="900" filter="url(#depth2)">14</text>
  <!-- Following -->
  <rect x="430" y="275" width="140" height="40" rx="20" fill="#b06ef3" opacity="0.10" stroke="#b06ef3" stroke-width="1" stroke-opacity="0.5"/>
  <text x="500" y="291" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="11" fill="#d0a8ff" font-weight="700">FOLLOWING</text>
  <text x="500" y="307" text-anchor="middle" font-family="'Trebuchet MS',sans-serif" font-size="16" fill="#ffffff" font-weight="900" filter="url(#depth2)">11</text>
  <!-- Since -->
  <rect x="590" y="275" width="200" height="40" rx="20" fill="#00ff88" opacity="0.08" stroke="#00ff88" stroke-width="1" stroke-opacity="0.5"/>
  <text x="690" y="291" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="11" fill="#8effc4" font-weight="700">GITHUB SINCE</text>
  <text x="690" y="307" text-anchor="middle" font-family="'Trebuchet MS',sans-serif" font-size="14" fill="#ffffff" font-weight="900">Dec 2023</text>
</g>

<!-- Floating particles -->
<circle cx="100" cy="100" r="2" fill="#ff1cf7" filter="url(#glow2)" opacity="0.8">
  <animateTransform attributeName="transform" type="translate" values="0,0;10,-18;0,0" dur="5s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0.8;0.2;0.8" dur="5s" repeatCount="indefinite"/>
</circle>
<circle cx="820" cy="280" r="2.2" fill="#00d4ff" filter="url(#glow2)" opacity="0.7">
  <animateTransform attributeName="transform" type="translate" values="0,0;-8,-15;0,0" dur="4.2s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0.7;0.15;0.7" dur="4.2s" repeatCount="indefinite"/>
</circle>
<circle cx="860" cy="150" r="1.5" fill="#00ff88" filter="url(#glow2sm)" opacity="0.9">
  <animateTransform attributeName="transform" type="translate" values="0,0;-5,-12;0,0" dur="6.1s" repeatCount="indefinite"/>
</circle>

<!-- Corner accents -->
<g fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.5" filter="url(#glow2sm)">
  <line x1="88" y1="64" x2="88" y2="80"/><line x1="88" y1="64" x2="104" y2="64"/>
  <line x1="812" y1="64" x2="812" y2="80"/><line x1="796" y1="64" x2="812" y2="64"/>
  <line x1="88" y1="330" x2="88" y2="314"/><line x1="88" y1="330" x2="104" y2="330"/>
  <line x1="812" y1="330" x2="812" y2="314"/><line x1="796" y1="330" x2="812" y2="330"/>
  <animate attributeName="opacity" values="0.5;0.15;0.5" dur="4s" repeatCount="indefinite"/>
</g>
</svg>
